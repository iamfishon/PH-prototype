// ─── Utilities ────────────────────────────────────────────────────────────────
function getAdStatus(ad) {
  if (!ad.isOpen) return 'draft';
  if (!ad.startTime || !ad.endTime) return 'draft';
  const s = new Date(ad.startTime), e = new Date(ad.endTime);
  if (NOW < s) return 'scheduled';
  if (NOW > e) return 'expired';
  return 'active';
}

function statusBadge(status) {
  const map = {
    active:    { label: '上架中',  bg: 'rgba(16,185,129,.15)', color: '#10b981', dot: '#10b981' },
    scheduled: { label: '排程中',  bg: 'rgba(245,158,11,.15)',  color: '#f59e0b', dot: '#f59e0b' },
    expired:   { label: '已過期',  bg: 'rgba(107,114,128,.15)', color: '#9ca3af', dot: '#9ca3af' },
    draft:     { label: '草稿',    bg: 'rgba(107,114,128,.12)', color: '#6b7280', dot: '#6b7280' },
  };
  const m = map[status] || map.draft;
  return `<span class="badge" style="background:${m.bg};color:${m.color};">
    <span style="width:5px;height:5px;border-radius:50%;background:${m.dot};display:inline-block;margin-right:5px;"></span>${m.label}
  </span>`;
}

function fmtTime(t) {
  if (!t) return '<span style="color:#6b6b80;">—</span>';
  return `<span style="color:#a0a0b8;">${t.replace('T', ' ')}</span>`;
}

}

// ─── Schedule Component ───────────────────────────────────────────────────────
function renderScheduleComponent(ad, radioName) {
  const adIsOpen = ad ? ad.isOpen : false;
  const status = ad ? getAdStatus(ad) : 'draft';

  // Status badge
  const badgeMap = {
    active:    { label: '進行中',   bg: '#16a34a', color: '#fff' },
    scheduled: { label: '即將開放', bg: '#d97706', color: '#fff' },
    expired:   { label: '已過期',   bg: '#dc2626', color: '#fff' },
    draft:     { label: '存成草稿', bg: '#3d3d5c', color: '#a0a0b8' },
  };
  const badge = badgeMap[status] || badgeMap.draft;

  // Status message
  const msgMap = {
    active:    '當前時間在排程範圍內，正在進行中',
    scheduled: '尚未到達上架時間，即將開放',
    expired:   '下架時間已過，此排程已過期',
  };
  const statusMsg = adIsOpen && msgMap[status] ? msgMap[status] : null;

  const createdAt = ad ? (ad.createdAt || '—') : '—';

  return `
  <div style="background:#0f1535;border:1px solid #3b3b6b;border-top:2px solid #7c3aed;border-radius:8px;overflow:hidden;">
    <!-- Card header -->
    <div style="padding:10px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #2d2d4a;">
      <span style="font-size:13px;font-weight:600;color:#c4b5fd;">前台</span>
      <svg width="15" height="15" fill="none" stroke="#6b6b80" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    </div>

    <!-- Card body -->
    <div style="padding:16px;">
      <!-- Row: title + badge -->
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
        <span style="font-size:13px;font-weight:600;color:#e0e0f0;">開放排程設定</span>
        <span style="background:${badge.bg};color:${badge.color};font-size:12px;font-weight:500;padding:3px 12px;border-radius:4px;">${badge.label}</span>
      </div>

      <!-- Created at -->
      <div style="font-size:11px;color:#6b6b80;margin-bottom:14px;">
        創建時間<br>
        <span style="color:#a0a0b8;">${createdAt}</span>
      </div>

      <!-- Radio: 不開放 -->
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;margin-bottom:14px;">
        <input type="radio" name="${radioName}" value="off" ${!adIsOpen ? 'checked' : ''}
          style="accent-color:#7c3aed;width:16px;height:16px;"
          onchange="onSchedRadioChange('${radioName}', this.value)">
        <span style="font-size:13px;color:#d0d0e8;">不開放（存成草稿）</span>
      </label>

      <!-- Radio: 開放 + date pickers -->
      <div style="display:flex;align-items:flex-start;gap:8px;">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;flex-shrink:0;margin-top:2px;">
          <input type="radio" name="${radioName}" value="on" ${adIsOpen ? 'checked' : ''}
            style="accent-color:#7c3aed;width:16px;height:16px;"
            onchange="onSchedRadioChange('${radioName}', this.value)">
          <span style="font-size:13px;color:#d0d0e8;">開放</span>
        </label>
        <div id="sched-dates-${radioName}" style="display:${adIsOpen ? 'flex' : 'none'};gap:16px;flex-wrap:wrap;">
          <div>
            <div style="font-size:11px;color:#a0a0b8;margin-bottom:4px;">上架時間</div>
            <input type="datetime-local" class="form-input" value="${ad ? ad.startTime : ''}" style="color-scheme:dark;width:200px;">
          </div>
          <div>
            <div style="font-size:11px;color:#a0a0b8;margin-bottom:4px;">下架時間</div>
            <input type="datetime-local" class="form-input" value="${ad ? ad.endTime : ''}" style="color-scheme:dark;width:200px;">

      <svg width="12" height="12" fill="none" stroke="#fff" stroke-width="2.2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
    </button>`;
}

function renderImageUpload(previewId, nameId, existingName, hint) {
  const hasImg = !!existingName;
  const imgSrc = hasImg
    ? `https://via.placeholder.com/220x138/252540/a0a0b8?text=${encodeURIComponent(existingName.substring(0,6))}`
    : '';
  return `
  <div>
    <input type="file" id="file-${nameId}" accept="image/*" style="display:none;" onchange="handleImageCardPreview('${previewId}','${nameId}',this)">
    <input type="hidden" id="${nameId}" value="${existingName || ''}">
    <div id="${previewId}" onclick="${hasImg ? '' : `document.getElementById('file-${nameId}').click()`}"
      style="width:220px;height:138px;background:#1a1a2e;border:2px dashed #3d3d5c;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#6b6b80;position:relative;overflow:hidden;cursor:${hasImg ? 'default' : 'pointer'};">
      ${hasImg
        ? _imgUploadedHtml(previewId, nameId, imgSrc, existingName)
        : `<svg width="32" height="32" fill="none" stroke="#6b6b80" stroke-width="1.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
           <div style="font-size:13px;margin-top:8px;color:#a0a0b8;">增加附件</div>
           <div style="font-size:11px;color:#6b6b80;margin-top:3px;">限制 2MB</div>`
      }
    </div>
    <div style="font-size:11px;color:#6b6b80;margin-top:6px;">${hint || '建議尺寸：1200×400px，JPG/PNG'}</div>
  </div>`;
}

function handleImageCardPreview(previewId, nameId, input) {
  if (!input.files || !input.files[0]) return;
  const file = input.files[0];
  const url = URL.createObjectURL(file);
  const el = document.getElementById(previewId);
  if (el) {
    el.style.cursor = 'default';
    el.onclick = null;
    el.innerHTML = _imgUploadedHtml(previewId, nameId, url, file.name);
  }
  document.getElementById(nameId).value = file.name;
}

function removeImageCard(previewId, nameId) {
  const el = document.getElementById(previewId);
  if (el) {
    el.style.cursor = 'pointer';
    el.onclick = function() { document.getElementById('file-' + nameId).click(); };
    el.innerHTML = `<svg width="32" height="32" fill="none" stroke="#6b6b80" stroke-width="1.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      <div style="font-size:13px;margin-top:8px;color:#a0a0b8;">增加附件</div>
      <div style="font-size:11px;color:#6b6b80;margin-top:3px;">限制 2MB</div>`;
  }
  const ni = document.getElementById(nameId);
  if (ni) ni.value = '';
}

// ─── Sidebar ──────────────────────────────────────────────────────────────────
const _sbOpen = {};
function renderSidebar() {
  let html = '';
  for (let gi = 0; gi < sidebarGroups.length; gi++) {
    const g = sidebarGroups[gi];
    // Determine open state; default from group.open or false
    if (_sbOpen[gi] === undefined) _sbOpen[gi] = !!g.open;
    const isExpanded = _sbOpen[gi];
    const hasItems = g.items.length > 0;
    html += `<div style="border-top:1px solid #1f1e38;">
      <div onclick="toggleSbGroup(${gi})" style="display:flex;align-items:center;justify-content:space-between;padding:10px 16px;cursor:pointer;font-size:12px;font-weight:600;color:${isExpanded ? '#c4b5fd' : '#a0a0b8'};letter-spacing:.03em;user-select:none;">
        <span>${g.group}</span>
        <span style="font-size:10px;transition:transform .2s;display:inline-block;transform:${isExpanded ? 'rotate(180deg)' : 'rotate(0deg)'};">▼</span>
      </div>`;
    if (isExpanded && hasItems) {
      html += `<div>`;
      for (const item of g.items) {
        const isActive = item.section === 'ad' && ['banner','mid','news'].includes(state.section);
        const click = item.section === 'ad' ? `goSection('banner')` : '';
        html += `<div class="sidebar-item ${isActive ? 'active' : ''}" ${click ? `onclick="${click}"` : ''}
          style="padding:8px 16px 8px ${isActive ? '13px' : '20px'};cursor:${click ? 'pointer' : 'default'};display:flex;align-items:center;gap:8px;font-size:13px;color:${isActive ? '#c4b5fd' : '#a0a0b8'};">
          <span style="width:5px;height:5px;border-radius:50%;background:${isActive ? '#7c3aed' : '#3d3d5c'};flex-shrink:0;"></span>
          ${item.label}
        </div>`;
      }
      html += `</div>`;
    }
    html += `</div>`;
  }
  document.getElementById('sidebar-content').innerHTML = html;
}

function toggleSbGroup(gi) {
  _sbOpen[gi] = !_sbOpen[gi];
  renderSidebar();
}

  let crumbs = `<span style="${crumbStyle}">首頁</span>${sep}<span style="${crumbStyle}">廣告管理</span>${sep}`;

  if (state.section === 'banner' || state.section === 'mid') {
    if (state.view === 'list') {
      crumbs += `<span style="${activeStyle}">廣告版位</span>`;
    } else if (state.section === 'banner') {
      crumbs += `<span style="${crumbStyle};cursor:pointer;" onclick="backToList()">廣告版位</span>${sep}<span style="${activeStyle}">橫幅廣告 · 編輯</span>`;
    } else {
      crumbs += `<span style="${crumbStyle};cursor:pointer;" onclick="backToList()">廣告版位</span>${sep}<span style="${activeStyle}">中段廣告 · ${state.formMode === 'add' ? '新增' : '編輯'}</span>`;

  } else if (state.section === 'news') {
    if (state.view === 'list') {
      crumbs += `<span style="${activeStyle}">廣告版位</span>`;
    } else {
      const subLabel = state.newsSubTab === 'inlay' ? '內嵌廣告' : state.newsSubTab === 'side-top' ? '側邊廣告（上方）' : '側邊廣告（下方）';

    }
  }
  document.getElementById('breadcrumb').innerHTML = crumbs;
}

              </td>
              <td class="table-td" style="max-width:200px;overflow:hidden;text-overflow:ellipsis;color:#d0d0e8;">${a.imageName || '<span style="color:#6b6b80;">—</span>'}</td>
              <td class="table-td">${visibleCell(a.isVisible)}</td>
              <td class="table-td" style="font-size:12px;color:#a0a0b8;">${a.createdAt || '—'}</td>
              <td class="table-td" style="font-size:12px;color:#a0a0b8;">${a.updatedAt || '—'}</td>
              <td class="table-td">${handlerCell(a.updatedBy)}</td>
              <td class="table-td">${actionCell(`openEditFormMid(${a.id})`)}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>

    <div style="margin-top:10px;display:flex;gap:20px;flex-wrap:wrap;">
      ${(() => {
        const total = midAds.length;
        const visibleCount = midAds.filter(a => a.isVisible).length;
        return `<span style="font-size:12px;color:#6b6b80;">總版位：<span style="color:#a0a0b8;">${total}</span></span>
                <span style="font-size:12px;color:#6b6b80;">顯示中：<span style="color:#22c55e;">${visibleCount}</span></span>
                <span style="font-size:12px;color:#6b6b80;">不顯示：<span style="color:#9ca3af;">${total - visibleCount}</span></span>`;
      })()}
    </div>
  </div>`;
}

// ─── Banner Form ───────────────────────────────────────────────────────────────
function renderBannerForm() {
  const ad = bannerAd;
  const promoLen = (ad.promoText || '').length;

  return `
  <div style="margin-top:8px;">
    <div class="section-card">
      ${renderLangTabs()}

      <!-- 底圖 + 促銷文字 並排 -->
      <div style="display:flex;gap:20px;align-items:flex-start;margin-bottom:20px;flex-wrap:wrap;">
        <div style="flex-shrink:0;">
          <label class="form-label">底圖 <span style="color:#7c3aed;">*</span></label>
          ${renderImageUpload('banner-img-preview', 'banner-img-name', ad.imageName, '建議尺寸：1920×480px，JPG/PNG')}
        </div>
        <div style="flex:1;min-width:180px;">
          <label class="form-label" style="display:flex;align-items:center;justify-content:space-between;">
            <span>促銷文字 <span style="color:#7c3aed;">*</span></span>
            <span style="font-size:11px;color:${promoLen > 20 ? '#ef4444' : '#6b6b80'};">${promoLen} / 20</span>
          </label>
          <input type="text" class="form-input" value="${ad.promoText}" maxlength="20" placeholder="最多 20 字">
        </div>
      </div>

      <!-- 排程 -->
      ${renderScheduleComponent(ad, 'sched_banner')}
    </div>

    <div style="margin-top:12px;display:flex;gap:24px;flex-wrap:wrap;">
      <span style="font-size:12px;color:#6b6b80;">建立時間：<span style="color:#a0a0b8;">${ad.createdAt}</span></span>
      <span style="font-size:12px;color:#6b6b80;">最後處理時間：<span style="color:#a0a0b8;">${ad.updatedAt}</span></span>
      <span style="font-size:12px;color:#6b6b80;">最後處理人員：${handlerCell(ad.updatedBy)}</span>
    </div>
  </div>`;
}

// ─── Mid Form ─────────────────────────────────────────────────────────────────
function renderMidForm() {
  const ad = state.formMode === 'edit' ? midAds.find(a => a.id === state.editId) : null;
  const promoLen = (ad?.promoText || '').length;

  return `
  <div style="margin-top:8px;">
    <div class="section-card">
      ${renderLangTabs()}

      <!-- 底圖 + 促銷文字 並排 -->
      <div style="display:flex;gap:20px;align-items:flex-start;margin-bottom:20px;flex-wrap:wrap;">
        <div style="flex-shrink:0;">
          <label class="form-label">底圖 <span style="color:#7c3aed;">*</span></label>
          ${renderImageUpload('mid-img-preview', 'mid-img-name', ad?.imageName || '', '建議尺寸：1200×400px，JPG/PNG')}
        </div>
        <div style="flex:1;min-width:180px;">
          <label class="form-label" style="display:flex;align-items:center;justify-content:space-between;">
            <span>促銷文字 <span style="color:#7c3aed;">*</span></span>
            <span style="font-size:11px;color:${promoLen > 20 ? '#ef4444' : '#6b6b80'};">${promoLen} / 20</span>
          </label>
          <input type="text" class="form-input" value="${ad?.promoText || ''}" maxlength="20" placeholder="最多 20 字">
        </div>
      </div>

      <!-- 排程 -->
      ${renderScheduleComponent(ad || null, 'sched_mid')}
    </div>

    ${ad ? `<div style="margin-top:12px;display:flex;gap:24px;flex-wrap:wrap;">
      <span style="font-size:12px;color:#6b6b80;">建立時間：<span style="color:#a0a0b8;">${ad.createdAt}</span></span>
      <span style="font-size:12px;color:#6b6b80;">最後處理時間：<span style="color:#a0a0b8;">${ad.updatedAt}</span></span>
      <span style="font-size:12px;color:#6b6b80;">最後處理人員：${handlerCell(ad.updatedBy)}</span>
    </div>` : ''}
  </div>`;
}

// ─── News Sub Tabs ────────────────────────────────────────────────────────────
function renderNewsSubTabs() {
  const tabs = [
    { key: 'inlay',    label: '內嵌廣告',       desc: 'Cookie 20 秒換頁，依序輪替' },
    { key: 'side-top', label: '側邊廣告（上方）', desc: '每 4 秒切換一張，依排序循環' },
    { key: 'side-bot', label: '側邊廣告（下方）', desc: '每 5 秒切換一張，依排序循環' },
  ];
  const activeTab = tabs.find(t => t.key === state.newsSubTab);
  return `
  <div style="margin-bottom:16px;">
    <div style="display:flex;gap:6px;border-bottom:1px solid #2d2d4a;margin-bottom:12px;">
      ${tabs.map(t => {
        const active = state.newsSubTab === t.key;
        return `<button class="tab-btn" onclick="state.newsSubTab='${t.key}';render();" style="padding:8px 16px;font-size:13px;border:none;background:transparent;cursor:pointer;border-bottom:2px solid ${active ? '#7c3aed' : 'transparent'};color:${active ? '#c4b5fd' : '#6b6b80'};margin-bottom:-1px;white-space:nowrap;">${t.label}</button>`;
      }).join('')}
    </div>
    ${activeTab ? `<div style="font-size:12px;color:#6b6b80;display:flex;align-items:center;gap:6px;">
      <svg width="12" height="12" fill="none" stroke="#6b6b80" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      ${activeTab.desc}
    </div>` : ''}
  </div>`;
}

// ─── News List ────────────────────────────────────────────────────────────────
function renderNewsList() {
  const ads = state.newsSubTab === 'inlay' ? inlayAds
    : state.newsSubTab === 'side-top' ? sideTopAds : sideBotAds;

  const rows = ads.map(ad => `<tr>
    <td class="table-td">${orderDropBtn(ad.order)}</td>
    <td class="table-td" style="color:#a0a0b8;font-size:13px;">${ad.id}</td>
    <td class="table-td">
      ${ad.imageName
        ? `<div class="img-card"><img src="https://via.placeholder.com/80x50/252540/a0a0b8?text=${encodeURIComponent(ad.imageName.substring(0,6))}" alt=""></div>`
        : `<div class="img-placeholder" style="font-size:11px;">無圖片</div>`}
    </td>
    <td class="table-td" style="max-width:200px;overflow:hidden;text-overflow:ellipsis;color:#d0d0e8;">${ad.imageName || '<span style="color:#6b6b80;">—</span>'}</td>
    <td class="table-td">${visibleCell(ad.isVisible)}</td>
    <td class="table-td" style="font-size:12px;color:#a0a0b8;">${ad.createdAt || '—'}</td>
    <td class="table-td" style="font-size:12px;color:#a0a0b8;">${ad.updatedAt || '—'}</td>
    <td class="table-td">${handlerCell(ad.updatedBy)}</td>
    <td class="table-td">${actionCell(`openEditFormNews(${ad.id})`)}</td>
  </tr>`).join('');

  return `
  <div style="margin-top:8px;">
    ${renderNewsSubTabs()}

    <div style="display:flex;justify-content:flex-end;margin-bottom:12px;">
      <button onclick="openAddFormNews()" style="background:linear-gradient(135deg,#7c3aed,#8b5cf6);border:none;color:#fff;padding:7px 14px;border-radius:6px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;font-weight:500;">
        ${iconPlus()} 新增廣告
      </button>
    </div>

    <div style="background:#1a1a2e;border:1px solid #2d2d4a;border-radius:10px;overflow:auto;">
      <table style="width:100%;border-collapse:collapse;min-width:760px;">
        <thead>
          <tr>
            <th class="table-th">排序</th>
            ${idTh()}
            <th class="table-th">圖片</th>
            <th class="table-th">檔案名稱</th>
            <th class="table-th">顯示</th>
            <th class="table-th">建立時間</th>
            <th class="table-th">最後處理時間</th>
            <th class="table-th">最後處理人員</th>
            <th class="table-th">操作</th>
          </tr>
        </thead>
        <tbody>
          ${rows || `<tr><td colspan="9" style="text-align:center;padding:32px;color:#6b6b80;font-size:13px;">尚無廣告資料</td></tr>`}
        </tbody>
      </table>
    </div>
  </div>`;
}

// ─── News Form ────────────────────────────────────────────────────────────────
function renderNewsForm() {
  const ads = state.newsSubTab === 'inlay' ? inlayAds
    : state.newsSubTab === 'side-top' ? sideTopAds : sideBotAds;
  const ad = state.formMode === 'edit' ? ads.find(a => a.id === state.editId) : null;
  const subLabel = state.newsSubTab === 'inlay' ? '內嵌廣告' : state.newsSubTab === 'side-top' ? '側邊廣告（上方）' : '側邊廣告（下方）';
  const imgHint = state.newsSubTab === 'inlay' ? '內嵌廣告：橫版圖片，建議 800×300px' : '側邊廣告：直版圖片，建議 300×600px';
  const maxOrder = ads.length + (state.formMode === 'add' ? 1 : 0);

  return `
  <div style="margin-top:8px;">
    <!-- Sub type tag -->
    <div style="margin-bottom:12px;">
      <span style="font-size:12px;background:rgba(124,58,237,.15);border:1px solid rgba(124,58,237,.3);color:#c4b5fd;padding:3px 10px;border-radius:9999px;">${subLabel}</span>
    </div>

    <div class="section-card">
      ${renderLangTabs()}

      <!-- 底圖 -->
      <div style="margin-bottom:20px;">
        <label class="form-label">底圖 <span style="color:#7c3aed;">*</span></label>
        ${renderImageUpload('news-img-preview', 'news-img-name', ad?.imageName || '', imgHint)}
      </div>

      <!-- 排程 -->
      ${renderScheduleComponent(ad || null, 'sched_news')}
    </div>

    ${ad ? `<div style="margin-top:12px;display:flex;gap:24px;flex-wrap:wrap;">
      <span style="font-size:12px;color:#6b6b80;">建立時間：<span style="color:#a0a0b8;">${ad.createdAt}</span></span>
      <span style="font-size:12px;color:#6b6b80;">最後處理時間：<span style="color:#a0a0b8;">${ad.updatedAt}</span></span>
      <span style="font-size:12px;color:#6b6b80;">最後處理人員：${handlerCell(ad.updatedBy)}</span>
    </div>` : ''}
  </div>`;
}

// ─── Action Functions ─────────────────────────────────────────────────────────
function goSection(sec) {
  state.section = sec;
  state.view = 'list';
  state.langTab = 'zh-TW';
  render();
}

function openEditFormBanner() {
  state.section = 'banner';
  state.view = 'form';
  state.formScheduleOpen = bannerAd.isOpen;
  state.langTab = 'zh-TW';
  render();
}

function openAddFormMid() {
  state.section = 'mid';
  state.view = 'form';
  state.formMode = 'add';
  state.editId = null;
  state.formScheduleOpen = false;
  state.langTab = 'zh-TW';
  render();
}

function openAddFormNews() {
  state.section = 'news';
  state.view = 'form';
  state.formMode = 'add';
  state.editId = null;
  state.formScheduleOpen = false;
  state.langTab = 'zh-TW';
  render();
}

function openEditFormMid(id) {
  const ad = midAds.find(a => a.id === id);
  state.section = 'mid';
  state.view = 'form';
  state.formMode = 'edit';
  state.editId = id;
  state.formScheduleOpen = ad ? ad.isOpen : true;
  state.langTab = 'zh-TW';
  render();
}

function openEditFormNews(id) {
  const ads = state.newsSubTab === 'inlay' ? inlayAds
    : state.newsSubTab === 'side-top' ? sideTopAds : sideBotAds;
  const ad = ads.find(a => a.id === id);
  state.view = 'form';
  state.formMode = 'edit';
  state.editId = id;
  state.formScheduleOpen = ad ? ad.isOpen : true;
  state.langTab = 'zh-TW';
  render();
}

function backToList() {
  state.view = 'list';
  render();
}

// ─── Main Render ──────────────────────────────────────────────────────────────
function renderPageActions() {
  const el = document.getElementById('page-actions');
  if (!el) return;
  if (state.view !== 'list') { el.innerHTML = ''; return; }
  el.innerHTML = `
    <button onclick="alert('清除快取')" style="background:#252540;border:1px solid #3d3d5c;color:#a0a0b8;padding:7px 14px;border-radius:6px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.85"/></svg>
      清除快取
    </button>
    <button onclick="render()" style="background:#252540;border:1px solid #3d3d5c;color:#a0a0b8;padding:7px 14px;border-radius:6px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
      刷新
    </button>`;
}

function render() {
  renderSidebar();
  renderBreadcrumb();
  renderPageTitle();
  renderPageActions();

  const mainTabs = renderMainTabs();

  let sectionContent = '';
  if (state.section === 'banner' || state.section === 'mid') {
    if (state.view === 'list') {
      sectionContent = renderBannerMidList();
    } else if (state.section === 'banner') {
      sectionContent = renderBannerForm();
    } else {
      sectionContent = renderMidForm();
    }
  } else if (state.section === 'news') {
    sectionContent = state.view === 'list' ? renderNewsList() : renderNewsForm();
  }

  document.getElementById('content').innerHTML = mainTabs + sectionContent;

  // Footer: show only when in form view
  const inForm = state.view === 'form';
  const footer = document.getElementById('edit-footer');
  footer.style.display = inForm ? 'flex' : 'none';
}

// ─── Init ─────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
