class AudioManager {
    constructor() {
        this.ctx = null; this.master = null; this.ambientOscs = []; this.ready = false;
    }
    init() {
        if (this.ready) return;
        try {
            this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            this.master = this.ctx.createGain();
            this.master.gain.value = 0.25;
            this.master.connect(this.ctx.destination);
            this.ready = true;
        } catch(e) { console.warn('Audio not available'); }
    }
    tone(freq, dur, type = 'sine', vol = 0.1) {
        if (!this.ready) return;
        const o = this.ctx.createOscillator(), g = this.ctx.createGain();
        o.type = type; o.frequency.value = freq;
        g.gain.setValueAtTime(vol, this.ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + dur);
        o.connect(g); g.connect(this.master); o.start(); o.stop(this.ctx.currentTime + dur);
    }
    collect() { this.tone(523,.1); setTimeout(()=>this.tone(659,.1),80); setTimeout(()=>this.tone(784,.15),160); }
    success() { [523,659,784,1047].forEach((f,i)=>setTimeout(()=>this.tone(f,.3),i*120)); }
    error() { this.tone(185,.25,'sawtooth',.04); setTimeout(()=>this.tone(165,.3,'sawtooth',.03),100); }
    click() { this.tone(800,.04,'square',.03); }
    page() { this.tone(300,.06,'triangle',.05); this.tone(600,.04,'triangle',.02); }
    rift() { this.tone(110,.8,'sine',.06); this.tone(165,.8,'sine',.04); this.tone(220,.6,'sine',.03); }
    startAmbient(level) {
        this.stopAmbient();
        if (!this.ready) return;
        const chords = [
            [220,277,330],[196,247,294],[175,220,262],[262,330,392]
        ];
        const notes = chords[level] || chords[0];
        notes.forEach(freq => {
            const o = this.ctx.createOscillator(), g = this.ctx.createGain();
            o.type = 'sine'; o.frequency.value = freq; g.gain.value = 0.018;
            o.connect(g); g.connect(this.master); o.start();
            // Gentle vibrato
            const lfo = this.ctx.createOscillator(); const lfoG = this.ctx.createGain();
            lfo.frequency.value = 0.3 + Math.random()*0.4; lfoG.gain.value = 1.5;
            lfo.connect(lfoG); lfoG.connect(o.frequency); lfo.start();
            this.ambientOscs.push(o, lfo);
        });
    }
    stopAmbient() {
        this.ambientOscs.forEach(o => { try { o.stop(); } catch(e){} });
        this.ambientOscs = [];
    }
}
const audio = new AudioManager();

function wobblyLine(g, x1, y1, x2, y2, segs = 6, jitter = 1.5) {
    let px = x1, py = y1;
    for (let i = 1; i <= segs; i++) {
        const t = i / segs;
        const nx = x1 + (x2-x1)*t + (i<segs ? (Math.random()-.5)*jitter*2 : 0);
        const ny = y1 + (y2-y1)*t + (i<segs ? (Math.random()-.5)*jitter*2 : 0);
        g.lineBetween(px, py, nx, ny);
        px = nx; py = ny;
    }
}
function wobblyRect(g, x, y, w, h, jitter = 1.5) {
    wobblyLine(g, x,y, x+w,y, 4, jitter);
    wobblyLine(g, x+w,y, x+w,y+h, 4, jitter);
    wobblyLine(g, x+w,y+h, x,y+h, 4, jitter);
    wobblyLine(g, x,y+h, x,y, 4, jitter);
}
function wobblyCircle(g, cx, cy, r, segs = 16, jitter = 2) {
    const pts = [];
    for (let i = 0; i <= segs; i++) {
        const a = (i/segs)*Math.PI*2;
        const rr = r + (Math.random()-.5)*jitter*2;
        pts.push({ x: cx+Math.cos(a)*rr, y: cy+Math.sin(a)*rr });
    }
    for (let i = 0; i < pts.length-1; i++) g.lineBetween(pts[i].x,pts[i].y,pts[i+1].x,pts[i+1].y);
}
function drawInkBorder(g, x, y, w, h, color = 0x2c1810) {
    g.lineStyle(2, color, 0.7);
    wobblyRect(g, x, y, w, h, 2);
    g.lineStyle(1, color, 0.3);
    wobblyRect(g, x-3, y-3, w+6, h+6, 3);
}

// 等角座標
function toIso(cx, cy) { return { x:(cx-cy)*(TILE_W/2), y:(cx+cy)*(TILE_H/2) }; }
function fromIso(ix, iy) { return { x:(ix/(TILE_W/2)+iy/(TILE_H/2))/2, y:(iy/(TILE_H/2)-ix/(TILE_W/2))/2 }; }

// ═══════════════════════════════════════════
//  SECTION 5: BootScene — 資源生成
// ═══════════════════════════════════════════
class BootScene extends Phaser.Scene {
    constructor() { super('BootScene'); }
    create() {
        this.generatePaperTexture();
        this.generatePlayerTexture();
        this.generateParticles();
        this.scene.start('MenuScene');
    }
    generatePaperTexture() {
        const c = document.createElement('canvas'); c.width = W; c.height = H;
        const ctx = c.getContext('2d');
        // 基底羊皮紙色
        ctx.fillStyle = '#e0d0a8'; ctx.fillRect(0,0,W,H);
        // 噪點紋理
        const img = ctx.getImageData(0,0,W,H);
        for (let i = 0; i < img.data.length; i+=4) {
            const n = (Math.random()-.5)*30;
            img.data[i]=Math.min(255,Math.max(0,img.data[i]+n));
            img.data[i+1]=Math.min(255,Math.max(0,img.data[i+1]+n));
            img.data[i+2]=Math.min(255,Math.max(0,img.data[i+2]+n));
        }
        ctx.putImageData(img,0,0);
        // 歲月斑點
        for (let i = 0; i < 12; i++) {
            ctx.fillStyle = `rgba(139,90,43,${Math.random()*0.07})`;
            ctx.beginPath(); ctx.arc(Math.random()*W,Math.random()*H,Math.random()*100+30,0,Math.PI*2); ctx.fill();
        }
        // 暈影（暗邊）
        const grad = ctx.createRadialGradient(W/2,H/2,150,W/2,H/2,550);
        grad.addColorStop(0,'rgba(0,0,0,0)'); grad.addColorStop(1,'rgba(0,0,0,0.35)');
        ctx.fillStyle = grad; ctx.fillRect(0,0,W,H);
        // 邊緣燒焦感
        ctx.fillStyle = 'rgba(60,30,10,0.15)';
        ctx.fillRect(0,0,W,8); ctx.fillRect(0,H-8,W,8); ctx.fillRect(0,0,8,H); ctx.fillRect(W-8,0,8,H);
        this.textures.addCanvas('paper', c);
        // 暗色紙張（用於 close-up）
        const c2 = document.createElement('canvas'); c2.width = 500; c2.height = 360;
        const ctx2 = c2.getContext('2d');
        ctx2.fillStyle = '#d4c498'; ctx2.fillRect(0,0,500,360);
        const img2 = ctx2.getImageData(0,0,500,360);
        for (let i = 0; i < img2.data.length; i+=4) {
            const n = (Math.random()-.5)*20;
            img2.data[i]=Math.min(255,Math.max(0,img2.data[i]+n));
            img2.data[i+1]=Math.min(255,Math.max(0,img2.data[i+1]+n));
            img2.data[i+2]=Math.min(255,Math.max(0,img2.data[i+2]+n));
        }
        ctx2.putImageData(img2,0,0);
        this.textures.addCanvas('paperDark', c2);
    }
    generatePlayerTexture() {
        const g = this.add.graphics();
        // 身體（長袍）
        g.fillStyle(0xd4c090); g.fillEllipse(16,22,12,18);
        // 頭
        g.fillStyle(0xe8c9a0); g.fillCircle(16,8,7);
        // 頭髮
        g.fillStyle(0x4a3020); g.fillEllipse(16,4,7,4);
        // 披風
        g.fillStyle(0x6a4a30); g.fillTriangle(9,15,23,15,16,35);
        // 時鐘符號
        g.lineStyle(1.5,GOLD_HEX); g.strokeCircle(16,20,4);
        g.lineBetween(16,18,16,20); g.lineBetween(16,20,18,21);
        // 手繪描邊
        g.lineStyle(1,0x2c1810,0.5);
        wobblyCircle(g,16,8,7.5,12,1); wobblyCircle(g,16,22,7,10,1);
        g.generateTexture('player',32,38); g.destroy();
    }
    generateParticles() {
        // 灰塵粒子
        let g = this.add.graphics();
        g.fillStyle(0xd4c090,0.6); g.fillCircle(4,4,4);
        g.generateTexture('dustParticle',8,8); g.destroy();
        // 發光粒子
        g = this.add.graphics();
        g.fillStyle(0xffffff,0.4); g.fillCircle(8,8,8);
        g.fillStyle(0xffffff,0.8); g.fillCircle(8,8,3);
        g.generateTexture('glow',16,16); g.destroy();
        // 火焰粒子
        g = this.add.graphics();
        g.fillStyle(0xffaa00); g.fillCircle(4,4,4);
        g.generateTexture('fireParticle',8,8); g.destroy();
    }
}

        const btnG = this.add.graphics();
        btnG.lineStyle(1.5,0x8a6a3a,0.8);
        wobblyRect(btnG,W/2-90,H/2+95,180,42,2);
        const btn = this.add.rectangle(W/2,H/2+116,180,42,0x000000,0)
            .setInteractive({useHandCursor:true});
        const btnTxt = this.add.text(W/2,H/2+116,'翻開歷史之書',{
            fontSize:'16px',fontFamily:'"Microsoft JhengHei", serif',color:INK
        }).setOrigin(0.5);
        btn.on('pointerover',()=>{ btnTxt.setColor(GOLD); });
        btn.on('pointerout',()=>{ btnTxt.setColor(INK); });

            gameState.currentLevel=0; gameState.collected=[]; gameState.completedLevels=[];
            this.cameras.main.fadeOut(600,0,0,0);
            this.time.delayedCall(600,()=>this.scene.start('GameScene',{level:0}));
        });
        // 操作說明
        this.add.text(W/2,H-70,'WASD 移動 · E/點擊 互動 · Tab 時間之書',{
            fontSize:'11px',color:'#8a7a6a',fontFamily:'"Microsoft JhengHei", serif'
        }).setOrigin(0.5);
    }
    drawCornerOrnament(g,x,y) {
        g.lineStyle(1,0x8a6a3a,0.4);
        for (let i=0;i<3;i++) {
            const a=i*Math.PI/4; const r=8+i*3;
            g.lineBetween(x,y,x+Math.cos(a)*r,y+Math.sin(a)*r);
        }
    }
    drawGear(x,y,r,color,alpha) {
        const g=this.add.graphics();
        g.lineStyle(1.5,color,alpha);
        wobblyCircle(g,x,y,r,20,2); wobblyCircle(g,x,y,r*0.5,12,1);
        for(let i=0;i<10;i++){const a=(i/10)*Math.PI*2;
            wobblyLine(g,x+Math.cos(a)*r*0.5,y+Math.sin(a)*r*0.5,x+Math.cos(a)*r,y+Math.sin(a)*r,3,1);
        }
        this.tweens.add({targets:g,angle:360,duration:30000,repeat:-1});
    }
    spawnDust() {
        for(let i=0;i<25;i++){
            const d=this.add.circle(Phaser.Math.Between(60,W-60),Phaser.Math.Between(50,H-50),
                Phaser.Math.Between(1,2),0xc4a97d,Phaser.Math.FloatBetween(0.1,0.3));
            this.tweens.add({targets:d,y:d.y-Phaser.Math.Between(20,60),alpha:0,
                duration:Phaser.Math.Between(4000,8000),delay:Phaser.Math.Between(0,3000),
                repeat:-1,yoyo:true});
        }
    }
}

// ═══════════════════════════════════════════
//  SECTION 7: Narrator 旁白系統
// ═══════════════════════════════════════════
class Narrator {
    constructor(scene) {
        this.scene = scene;
        this.bg = scene.add.rectangle(W/2,H-35,W-120,44,0x1a1510,0.85)
            .setStrokeStyle(1,0x8a6a3a,0.4).setDepth(850).setAlpha(0);
        this.text = scene.add.text(W/2,H-35,'',{
            fontSize:'13px',fontFamily:'Georgia,"Microsoft JhengHei",serif',
            color:'#c4b090',align:'center',wordWrap:{width:W-160}
        }).setOrigin(0.5).setDepth(851).setAlpha(0);
        this.queue=[]; this.typing=false; this.timer=null;
    }
    say(msg,delay=0) {
        this.queue.push({msg,delay});
        if(!this.typing) this.next();
    }
    next() {
        if(this.queue.length===0){this.typing=false; this.hide(); return;}
        this.typing=true;
        const{msg,delay}=this.queue.shift();
        this.scene.time.delayedCall(delay,()=>{
            this.show();
            let i=0; this.text.setText('');
            if(this.timer) this.timer.remove();
            this.timer=this.scene.time.addEvent({delay:40,callback:()=>{
                this.text.setText(msg.substring(0,++i));
                if(i>=msg.length){
                    this.timer.remove();
                    this.scene.time.delayedCall(3000,()=>this.next());
                }
            },repeat:msg.length-1});
        });
    }
    show(){ this.scene.tweens.add({targets:[this.bg,this.text],alpha:1,duration:300}); }
    hide(){ this.scene.tweens.add({targets:[this.bg,this.text],alpha:0,duration:500}); }
    destroy(){ if(this.timer)this.timer.remove(); this.bg.destroy(); this.text.destroy(); }
}

class GameScene extends Phaser.Scene {
    constructor() { super('GameScene'); }
    init(data) {

        this.ld = LEVELS[this.lvlIdx];
        this.collected = [];
        this.interSprites = [];
        this.blocked = false; // dialog/closeup/book open
        this.moveTarget = null;
        this.pcx = this.ld.playerStart.x;
        this.pcy = this.ld.playerStart.y;
        this.riftShown = false;
        this.bookOpen = false;
        this.closeupOpen = false;
        this.firstCollected = false;
    }
    create() {
        this.cameras.main.fadeIn(600,0,0,0);
        audio.init(); audio.startAmbient(this.lvlIdx);
        // 地圖偏移
        this.ox = W/2; this.oy = 80;
        // 紙張背景 + 關卡色調
        this.add.image(W/2,H/2,'paper').setDisplaySize(W,H).setDepth(0);
        const overlay = this.add.graphics().setDepth(1);
        overlay.fillStyle(Phaser.Display.Color.HexStringToColor(this.ld.bg).color,0.55);
        overlay.fillRect(0,0,W,H);
        // 畫地圖
        this.drawMap();

        // 放置互動點
        this.placeInteractions();
        // 時間裂隙
        if(this.ld.rift) this.createRift();
        // 玩家
        const si = toIso(this.pcx,this.pcy);
        this.player = this.add.sprite(this.ox+si.x,this.oy+si.y-10,'player').setOrigin(0.5,0.8).setDepth(500);
        // 灰塵粒子
        this.spawnDust();
        // 鍵盤
        this.cursors = this.input.keyboard.createCursorKeys();
        this.keyW=this.input.keyboard.addKey('W'); this.keyA=this.input.keyboard.addKey('A');
        this.keyS=this.input.keyboard.addKey('S'); this.keyD=this.input.keyboard.addKey('D');
        this.keyE=this.input.keyboard.addKey('E'); this.keyTab=this.input.keyboard.addKey('TAB');
        // 點擊移動
        this.input.on('pointerdown',p=>{
            if(this.blocked) return;
            const cart = fromIso(p.x-this.ox,p.y-this.oy);
            if(cart.x>=0&&cart.x<COLS&&cart.y>=0&&cart.y<ROWS) this.moveTarget=cart;
        });
        // UI
        this.createHUD();
        // 旁白
        this.narrator = new Narrator(this);
        this.narrator.say(this.ld.narrator.enter, 800);
        // 關卡介紹
        this.showIntro();
    }

    // --- 地圖繪製 ---
    drawMap() {
        const mg = this.add.graphics().setDepth(2);
        for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
            const tile=this.ld.map[r][c];
            const iso=toIso(c,r); const sx=this.ox+iso.x,sy=this.oy+iso.y;
            let col=this.ld.colors.ground, al=0.7;
            if(tile===1) col=this.ld.colors.grass;
            else if(tile===2){col=this.ld.colors.water;al=0.5;}
            else if(tile===3){col=this.ld.colors.stone;al=0.6;}
            else if(tile===4) col=this.ld.colors.accent;
            else if(tile===5) col=this.ld.colors.accent;
            // 菱形
            mg.fillStyle(col,al);
            mg.beginPath(); mg.moveTo(sx,sy-TILE_H/2); mg.lineTo(sx+TILE_W/2,sy);
            mg.lineTo(sx,sy+TILE_H/2); mg.lineTo(sx-TILE_W/2,sy); mg.closePath(); mg.fillPath();
            // 手繪邊線
            mg.lineStyle(1,0x2c1810,0.12);
            mg.beginPath(); mg.moveTo(sx,sy-TILE_H/2); mg.lineTo(sx+TILE_W/2,sy);
            mg.lineTo(sx,sy+TILE_H/2); mg.lineTo(sx-TILE_W/2,sy); mg.closePath(); mg.strokePath();
            // 水面波紋
            if(tile===2){mg.lineStyle(1,0xffffff,0.12);mg.lineBetween(sx-6,sy,sx+6,sy);}
        }
    }
    drawTrees() {
        this.ld.trees.forEach(t=>{
            const iso=toIso(t.x,t.y); const sx=this.ox+iso.x,sy=this.oy+iso.y;
            const tg=this.add.graphics().setDepth(t.y*COLS+t.x+3);
            // 樹幹
            tg.fillStyle(0x5c4033,0.8); tg.fillRect(sx-3,sy-28,6,18);
            // 樹冠（手繪感）
            tg.fillStyle(this.ld.colors.grass,0.7);
            tg.fillCircle(sx,sy-36,12); tg.fillCircle(sx-7,sy-30,9); tg.fillCircle(sx+7,sy-30,9);
            // 手繪描邊
            tg.lineStyle(1,0x2c1810,0.25);
            wobblyCircle(tg,sx,sy-36,12.5,10,1.5);
        });
    }

    // --- 互動點 ---
    placeInteractions() {
        this.ld.interactions.forEach((inter,idx)=>{
            const iso=toIso(inter.tileX,inter.tileY);
            const sx=this.ox+iso.x, sy=this.oy+iso.y;
            const ct=this.add.container(sx,sy-6).setDepth(inter.tileY*COLS+inter.tileX+3);
            // 發光光環
            const glow=this.add.image(0,0,'glow').setScale(2.5).setAlpha(0.3).setTint(GOLD_HEX);
            ct.add(glow);
            // Emoji
            const icon=this.add.text(0,-6,inter.emoji,{fontSize:'22px'}).setOrigin(0.5);
            ct.add(icon);
            // 名稱（靠近才顯示）
            const label=this.add.text(0,14,inter.name,{
                fontSize:'10px',fontFamily:'"Microsoft JhengHei",serif',color:GOLD,
                stroke:'#000',strokeThickness:2
            }).setOrigin(0.5).setAlpha(0);
            ct.add(label);
            ct.setSize(40,40).setInteractive({useHandCursor:true});
            ct.on('pointerdown',()=>{ if(!this.blocked) this.tryInteract(idx); });
            // 浮動動畫
            this.tweens.add({targets:icon,y:-10,duration:1800,yoyo:true,repeat:-1,ease:'Sine.easeInOut'});
            this.tweens.add({targets:glow,alpha:0.1,scaleX:3,scaleY:3,duration:1500,yoyo:true,repeat:-1,ease:'Sine.easeInOut'});
            ct._inter=inter; ct._idx=idx; ct._glow=glow; ct._label=label; ct._icon=icon;
            this.interSprites.push(ct);
        });
    }
    tryInteract(idx) {
        const ct=this.interSprites[idx]; const inter=ct._inter;
        const dist=Phaser.Math.Distance.Between(this.pcx,this.pcy,inter.tileX,inter.tileY);
        if(dist>INTERACT_R){ this.moveTarget={x:inter.tileX,y:inter.tileY}; return; }
        if(this.collected.includes(inter.id)) return;
        // 先決條件檢查
        if(inter.prereq && !this.collected.includes(inter.prereq)){
            this.narrator.say('似乎還缺少什麼線索...也許應該先探索其他地方。');
            return;
        }
        audio.click();
        this.openCloseup(inter,ct);
    }

    // --- Close-up 互動面板 (Cube Escape 風格) ---
    openCloseup(inter,ct) {
        this.blocked=true; this.closeupOpen=true;
        const cg=this.add.container(W/2,H/2).setDepth(900).setAlpha(0);
        this._closeupContainer=cg;
        // 遮罩
        const mask=this.add.rectangle(0,0,W,H,0x000000,0.6).setOrigin(0.5);
        cg.add(mask);
        // 紙張面板
        const panel=this.add.image(0,0,'paperDark').setDisplaySize(500,360);
        cg.add(panel);
        // 手繪邊框
        const border=this.add.graphics();
        drawInkBorder(border,-248,-178,496,356,0x5c4033);
        cg.add(border);
        // 標題
        cg.add(this.add.text(0,-155,inter.closeupTitle,{
            fontSize:'20px',fontFamily:'Georgia,"Microsoft JhengHei",serif',color:INK
        }).setOrigin(0.5));
        // 場景繪製
        this.drawCloseupScene(cg,inter);
        // 提示文字
        const hint=this.add.text(0,60,inter.closeupHint,{
            fontSize:'13px',fontFamily:'"Microsoft JhengHei",serif',color:INK_LIGHT,align:'center'
        }).setOrigin(0.5);
        cg.add(hint);
        // 互動按鈕（蒐集證據）
        const collectBtn=this.add.rectangle(0,110,160,36,0x2c1810,0.1)
            .setStrokeStyle(1,0x8a6a3a,0.6).setInteractive({useHandCursor:true});
        cg.add(collectBtn);
        const collectTxt=this.add.text(0,110,`蒐集 ${inter.emoji} ${inter.name}`,{
            fontSize:'12px',fontFamily:'"Microsoft JhengHei",serif',color:GOLD
        }).setOrigin(0.5);
        cg.add(collectTxt);
        collectBtn.on('pointerover',()=>collectBtn.setFillStyle(0x8a6a3a,0.2));
        collectBtn.on('pointerout',()=>collectBtn.setFillStyle(0x2c1810,0.1));
        collectBtn.on('pointerdown',()=>{
            audio.collect();
            // 顯示揭露文字
            hint.setText('');
            collectBtn.setVisible(false); collectTxt.setVisible(false);
            const reveal=this.add.text(0,30,inter.revealText,{
                fontSize:'13px',fontFamily:'Georgia,"Microsoft JhengHei",serif',
                color:INK,align:'center',lineSpacing:6,wordWrap:{width:420}
            }).setOrigin(0.5,0).setAlpha(0);
            cg.add(reveal);
            this.tweens.add({targets:reveal,alpha:1,duration:600});
            // 描述
            const descTxt=this.add.text(0,140,inter.desc,{
                fontSize:'11px',fontFamily:'"Microsoft JhengHei",serif',
                color:INK_LIGHT,fontStyle:'italic'
            }).setOrigin(0.5).setAlpha(0);
            cg.add(descTxt);
            this.tweens.add({targets:descTxt,alpha:1,duration:600,delay:400});
            // 關閉提示
            const closeTxt=this.add.text(0,165,'[ 點擊任意處關閉 ]',{
                fontSize:'10px',color:'#8a7a6a'
            }).setOrigin(0.5).setAlpha(0);
            cg.add(closeTxt);
            this.tweens.add({targets:closeTxt,alpha:1,duration:400,delay:800,onComplete:()=>{
                this.time.delayedCall(300,()=>{
                    mask.setInteractive();
                    mask.once('pointerdown',()=>this.closeCloseup(inter,ct));
                    this.input.keyboard.once('keydown',()=>this.closeCloseup(inter,ct));
                });
            }});
        });
        // 右上關閉按鈕
        const closeX=this.add.text(230,-165,'✕',{fontSize:'18px',color:INK_LIGHT})
            .setOrigin(0.5).setInteractive({useHandCursor:true});
        cg.add(closeX);
        closeX.on('pointerdown',()=>{ this.closeCloseup(null,null); });
        // 淡入
        this.tweens.add({targets:cg,alpha:1,duration:400});
    }
    drawCloseupScene(cg,inter) {
        const sg=this.add.graphics();
        const bgType=inter.closeupBg;
        // 場景插圖區域
        const ilY=-50; const ilW=200, ilH=120;
        if(bgType==='stone'){
            sg.fillStyle(0x8a8a7a,0.4); sg.fillRoundedRect(-ilW/2,ilY-ilH/2,ilW,ilH,8);
            sg.lineStyle(2,0x5c4033,0.5); wobblyRect(sg,-ilW/2,ilY-ilH/2,ilW,ilH,2);
        } else if(bgType==='bush'||bgType==='tree'){
            sg.fillStyle(this.ld.colors.grass,0.3); sg.fillRoundedRect(-ilW/2,ilY-ilH/2,ilW,ilH,8);
            // 葉子
            for(let i=0;i<8;i++){
                sg.fillStyle(this.ld.colors.grass,0.2+Math.random()*0.2);
                sg.fillCircle(-60+Math.random()*120,ilY-30+Math.random()*60,8+Math.random()*12);
            }
        } else if(bgType==='ground'){
            sg.fillStyle(this.ld.colors.ground,0.3); sg.fillRoundedRect(-ilW/2,ilY-ilH/2,ilW,ilH,8);
            // 地面紋理
            sg.lineStyle(1,0x2c1810,0.1);
            for(let i=0;i<6;i++) wobblyLine(sg,-80,ilY-20+i*12,80,ilY-18+i*12,8,3);
        } else if(bgType==='sky'){
            sg.fillStyle(0x2a3a5a,0.3); sg.fillRoundedRect(-ilW/2,ilY-ilH/2,ilW,ilH,8);
        } else if(bgType==='gate'){
            sg.fillStyle(0x4a3a2a,0.4); sg.fillRoundedRect(-ilW/2,ilY-ilH/2,ilW,ilH,8);
            // 門框
            sg.lineStyle(2,0x8a6a3a,0.5);
            sg.strokeRect(-30,ilY-50,60,80);
            sg.lineBetween(-30,ilY-50,0,ilY-65); sg.lineBetween(0,ilY-65,30,ilY-50);
        } else if(bgType==='altar'){
            sg.fillStyle(this.ld.colors.ground,0.3); sg.fillRoundedRect(-ilW/2,ilY-ilH/2,ilW,ilH,8);
            sg.fillStyle(0x8a8a7a,0.4); sg.fillRect(-25,ilY-10,50,30); // 祭壇石
        } else if(bgType==='face'){
            sg.fillStyle(0x3a2a1a,0.3); sg.fillRoundedRect(-ilW/2,ilY-ilH/2,ilW,ilH,8);
            sg.lineStyle(1.5,0x8a6a3a,0.3); wobblyCircle(sg,0,ilY,35,16,3); // 臉
        } else if(bgType==='scroll'){
            sg.fillStyle(0xd4c090,0.3); sg.fillRoundedRect(-ilW/2,ilY-ilH/2,ilW,ilH,8);
            sg.lineStyle(1,0x8a6a3a,0.3);
            for(let i=0;i<5;i++) wobblyLine(sg,-70,ilY-35+i*16,70,ilY-35+i*16,6,2);
        } else if(bgType==='ruins'||bgType==='temple'){
            sg.fillStyle(0x3a3040,0.3); sg.fillRoundedRect(-ilW/2,ilY-ilH/2,ilW,ilH,8);
            sg.lineStyle(1.5,0x5a5060,0.3);
            sg.strokeRect(-40,ilY-30,15,50); sg.strokeRect(25,ilY-30,15,50); // 柱子
        }
        // 中央大 emoji
        cg.add(this.add.text(0,ilY,inter.emoji,{fontSize:'40px'}).setOrigin(0.5));
        cg.add(sg);
    }
    closeCloseup(inter,ct) {
        if(!this.closeupOpen) return;
        if(inter && !this.collected.includes(inter.id)){
            this.collected.push(inter.id);
            gameState.collected.push(inter.id);
            // 隱藏地圖上的圖示
            if(ct){
                this.tweens.add({targets:ct,scaleX:0,scaleY:0,alpha:0,duration:400,ease:'Back.easeIn',
                    onComplete:()=>ct.setVisible(false)});
            }
            this.updateInventory();
            if(!this.firstCollected){this.firstCollected=true;this.narrator.say(this.ld.narrator.first);}
            if(this.collected.length===this.ld.interactions.length){
                this.narrator.say(this.ld.narrator.allFound,1000);
            }
        }
        this.tweens.add({targets:this._closeupContainer,alpha:0,duration:300,
            onComplete:()=>{this._closeupContainer.destroy();this.closeupOpen=false;
                if(this.collected.length===this.ld.interactions.length) this.time.delayedCall(3500,()=>this.openStage());
                else this.blocked=false;
            }});
    }

    // --- 時間裂隙 (Moncage 風格) ---
    createRift() {
        const r=this.ld.rift;
        const iso=toIso(r.tileX,r.tileY); const sx=this.ox+iso.x,sy=this.oy+iso.y;
        this.riftX=r.tileX; this.riftY=r.tileY;
        // 裂隙視覺
        const rg=this.add.graphics().setDepth(r.tileY*COLS+r.tileX+3);
        rg.lineStyle(2,GLOW_BLUE_HEX,0.4);
        rg.lineBetween(sx-8,sy-15,sx+3,sy+12);
        rg.lineBetween(sx+3,sy+12,sx-5,sy+20);
        rg.lineStyle(1,GLOW_BLUE_HEX,0.2);
        rg.lineBetween(sx-12,sy-10,sx,sy+15);
        this.riftGfx=rg;
        // 發光動畫
        this.tweens.add({targets:rg,alpha:0.3,duration:1500,yoyo:true,repeat:-1});
        // 預覽面板（隱藏）
        this.riftPanel=this.add.container(W/2,H/2).setDepth(800).setAlpha(0);
        const rpBg=this.add.rectangle(0,0,W,H,0x000000,0.7);
        this.riftPanel.add(rpBg);
        // 分割線
        const splitLine=this.add.graphics();
        splitLine.lineStyle(3,GLOW_BLUE_HEX,0.6);
        splitLine.lineBetween(0,-200,0,200);
        // 發光邊線
        for(let i=-200;i<200;i+=20){
            splitLine.lineStyle(1,GLOW_BLUE_HEX,0.1+Math.random()*0.2);
            splitLine.lineBetween(-2+Math.random()*4,i,-2+Math.random()*4,i+20);
        }
        this.riftPanel.add(splitLine);
        // 左側：當前時代
        this.riftPanel.add(this.add.text(-200,-100,this.ld.name,{
            fontSize:'24px',fontFamily:'Georgia,"Microsoft JhengHei",serif',color:GOLD
        }).setOrigin(0.5));
        this.riftPanel.add(this.add.text(-200,-60,this.ld.sub,{fontSize:'12px',color:'#8a7a6a'}).setOrigin(0.5));
        // 右側：下個時代預覽
        this.riftPanel.add(this.add.text(200,-100,r.preview,{
            fontSize:'24px',fontFamily:'Georgia,"Microsoft JhengHei",serif',color:GLOW_BLUE
        }).setOrigin(0.5));
        this.riftPanel.add(this.add.text(200,-40,r.previewEmoji,{fontSize:'48px'}).setOrigin(0.5));
        this.riftPanel.add(this.add.text(200,20,r.hint,{
            fontSize:'14px',fontFamily:'"Microsoft JhengHei",serif',color:'#8a9aaa',fontStyle:'italic'
        }).setOrigin(0.5));
        // 關閉提示
        this.riftPanel.add(this.add.text(0,170,'移開即關閉',{fontSize:'11px',color:'#666'}).setOrigin(0.5));
    }
    checkRift() {
        if(!this.ld.rift || this.riftShown) return;
        const dist=Phaser.Math.Distance.Between(this.pcx,this.pcy,this.riftX,this.riftY);
        if(dist<2 && this.riftPanel.alpha<0.5){
            audio.rift(); this.riftShown=true;
            if(this.ld.narrator.rift) this.narrator.say(this.ld.narrator.rift);
            this.tweens.add({targets:this.riftPanel,alpha:1,duration:600});
        }
        if(dist>3.5 && this.riftPanel.alpha>0.5){
            this.tweens.add({targets:this.riftPanel,alpha:0,duration:400});
        }
    }

    // --- 時間之書 ---
    toggleBook() {
        if(this.closeupOpen) return;
        audio.page();
        if(this.bookOpen) { this.closeBook(); return; }
        this.bookOpen=true; this.blocked=true;
        this.bookCt=this.add.container(W/2,H/2).setDepth(880).setAlpha(0);
        // 遮罩
        this.bookCt.add(this.add.rectangle(0,0,W,H,0x000000,0.6));
        // 書頁背景
        this.bookCt.add(this.add.image(0,0,'paper').setDisplaySize(600,440));
        // 邊框
        const bb=this.add.graphics();
        drawInkBorder(bb,-298,-218,596,436,0x5c4033);
        this.bookCt.add(bb);
        // 標題
        this.bookCt.add(this.add.text(0,-195,'時 間 之 書',{
            fontSize:'22px',fontFamily:'Georgia,"Microsoft JhengHei",serif',color:INK
        }).setOrigin(0.5));
        this.bookCt.add(this.add.text(0,-170,`第 ${this.lvlIdx+1} 章 — ${this.ld.name}`,{
            fontSize:'13px',color:INK_LIGHT,fontFamily:'"Microsoft JhengHei",serif'
        }).setOrigin(0.5));
        // 分隔線
        const sep=this.add.graphics(); sep.lineStyle(1,0x8a6a3a,0.3); wobblyLine(sep,-250,-155,250,-155,12,2);
        this.bookCt.add(sep);
        // 證據列表
        this.ld.interactions.forEach((inter,i)=>{
            const y=-130+i*68;
            const found=this.collected.includes(inter.id);
            // 邊框
            const ig=this.add.graphics();
            ig.lineStyle(1,found?0x8a6a3a:0x666666,found?0.5:0.2);
            wobblyRect(ig,-260,y,520,58,1.5);
            this.bookCt.add(ig);
            if(found){
                this.bookCt.add(this.add.text(-240,y+8,inter.emoji,{fontSize:'24px'}));
                this.bookCt.add(this.add.text(-205,y+6,inter.name,{fontSize:'14px',color:INK,fontFamily:'"Microsoft JhengHei",serif',fontStyle:'bold'}));
                this.bookCt.add(this.add.text(-205,y+28,inter.desc,{fontSize:'10px',color:INK_LIGHT,fontFamily:'"Microsoft JhengHei",serif',wordWrap:{width:440}}));
            } else {
                this.bookCt.add(this.add.text(-240,y+8,'❓',{fontSize:'24px'}));
                this.bookCt.add(this.add.text(-205,y+16,'未發現',{fontSize:'13px',color:'#888',fontFamily:'"Microsoft JhengHei",serif'}));
                if(inter.prereq && !this.collected.includes(inter.prereq)){
                    this.bookCt.add(this.add.text(-205,y+34,'（需要先找到其他線索）',{fontSize:'9px',color:'#777',fontFamily:'"Microsoft JhengHei",serif'}));
                }
            }
        });
        // 關閉
        const closeBtn=this.add.text(280,-200,'✕',{fontSize:'18px',color:INK_LIGHT}).setInteractive({useHandCursor:true});
        closeBtn.on('pointerdown',()=>this.closeBook());
        this.bookCt.add(closeBtn);
        this.tweens.add({targets:this.bookCt,alpha:1,duration:300});
    }
    closeBook() {
        if(!this.bookOpen) return;
        this.tweens.add({targets:this.bookCt,alpha:0,duration:250,onComplete:()=>{
            this.bookCt.destroy(); this.bookOpen=false; this.blocked=false;
        }});
    }

        // 互動提示
        this.hintTxt=this.add.text(W/2,H-65,'',{fontSize:'12px',color:GOLD,
            fontFamily:'"Microsoft JhengHei",serif',stroke:'#000',strokeThickness:2
        }).setOrigin(0.5).setDepth(801).setAlpha(0);
    }
    updateInventory() {
        const idx=this.collected.length-1;
        const inter=this.ld.interactions.find(i=>i.id===this.collected[idx]);
        if(idx<this.invSlots.length && inter){
            const s=this.invSlots[idx];
            s.bg.setStrokeStyle(1,GOLD_HEX,0.5);
            s.txt.setText(`${inter.emoji} ${inter.name}`).setColor(GOLD).setFontSize(10);
        }
        this.counterTxt.setText(`證據 ${this.collected.length}/${this.ld.interactions.length}`).setColor(GOLD);
    }

    // --- 關卡介紹 ---
    showIntro() {
        this.blocked=true;
        const ct=this.add.container(W/2,H/2).setDepth(950);
        this._introCt=ct;
        ct.add(this.add.rectangle(0,0,W,H,0x000000,0.7));
        const t1=this.add.text(0,-80,`第 ${this.lvlIdx+1} 章`,{fontSize:'14px',color:GLOW_BLUE,fontFamily:'"Microsoft JhengHei",serif'}).setOrigin(0.5).setAlpha(0);
        const t2=this.add.text(0,-45,this.ld.name,{fontSize:'38px',fontFamily:'Georgia,"Microsoft JhengHei",serif',color:GOLD,stroke:'#000',strokeThickness:2}).setOrigin(0.5).setAlpha(0);
        const t3=this.add.text(0,-8,this.ld.sub,{fontSize:'15px',color:'#8a7a6a',fontFamily:'Georgia,serif'}).setOrigin(0.5).setAlpha(0);
        const t4=this.add.text(0,40,this.ld.desc,{fontSize:'14px',color:'#aaa',fontFamily:'"Microsoft JhengHei",serif',align:'center',lineSpacing:6,wordWrap:{width:450}}).setOrigin(0.5,0).setAlpha(0);
        const t5=this.add.text(0,130,'按任意鍵開始探索...',{fontSize:'11px',color:'#666'}).setOrigin(0.5).setAlpha(0);
        [t1,t2,t3,t4,t5].forEach(t=>ct.add(t));
        this.tweens.add({targets:t1,alpha:1,y:'-=8',duration:500,delay:200});
        this.tweens.add({targets:t2,alpha:1,y:'-=8',duration:500,delay:500});
        this.tweens.add({targets:t3,alpha:1,duration:500,delay:800});
        this.tweens.add({targets:t4,alpha:1,duration:600,delay:1100});
        this.tweens.add({targets:t5,alpha:1,duration:400,delay:1800,onComplete:()=>{
            this.input.keyboard.once('keydown',()=>this.closeIntro());
            this.input.once('pointerdown',()=>this.closeIntro());
        }});
    }
    closeIntro() {
        if(!this._introCt) return;
        this.tweens.add({targets:this._introCt,alpha:0,duration:300,onComplete:()=>{
            this._introCt.destroy();this._introCt=null;this.blocked=false;
        }});
    }

    // --- 灰塵粒子 ---
    spawnDust() {
        for(let i=0;i<15;i++){
            const d=this.add.circle(Phaser.Math.Between(50,W-120),Phaser.Math.Between(50,H-50),
                Phaser.Math.Between(1,2),0xc4a97d,Phaser.Math.FloatBetween(0.05,0.15)).setDepth(700);
            this.tweens.add({targets:d,y:d.y-Phaser.Math.Between(30,80),alpha:0,
                duration:Phaser.Math.Between(5000,10000),delay:Phaser.Math.Between(0,4000),repeat:-1,yoyo:true});
        }
    }

    // --- 進入因果舞台 ---
    openStage() {
        this.blocked=true;
        audio.stopAmbient();
        this.cameras.main.fadeOut(600,0,0,0);
        this.time.delayedCall(600,()=>{
            this.narrator.destroy();
            this.scene.start('CausalityScene',{level:this.lvlIdx});
        });
    }

    // --- 更新循環 ---
    update(time,delta) {
        if(this.blocked) return;
        const dt=delta/1000;
        let dx=0,dy=0;
        if(this.cursors.up.isDown||this.keyW.isDown){dx-=1;dy-=1;}
        if(this.cursors.down.isDown||this.keyS.isDown){dx+=1;dy+=1;}
        if(this.cursors.left.isDown||this.keyA.isDown){dx-=1;dy+=1;}
        if(this.cursors.right.isDown||this.keyD.isDown){dx+=1;dy-=1;}
        // 滑鼠移動
        if(this.moveTarget&&dx===0&&dy===0){
            const tdx=this.moveTarget.x-this.pcx,tdy=this.moveTarget.y-this.pcy;
            const d=Math.sqrt(tdx*tdx+tdy*tdy);
            if(d>0.3){dx=tdx/d;dy=tdy/d;}else this.moveTarget=null;
        } else if(dx||dy) this.moveTarget=null;
        // 移動
        if(dx||dy){
            const len=Math.sqrt(dx*dx+dy*dy);
            dx=(dx/len)*SPD*dt/TILE_W*2; dy=(dy/len)*SPD*dt/TILE_H*2;
            const nx=this.pcx+dx,ny=this.pcy+dy;
            if(nx>=0.5&&nx<COLS-0.5&&ny>=0.5&&ny<ROWS-0.5){
                const tv=this.ld.map[Math.floor(ny)][Math.floor(nx)];
                if(tv!==2&&tv!==3){this.pcx=nx;this.pcy=ny;}
            }
            const iso=toIso(this.pcx,this.pcy);
            this.player.setPosition(this.ox+iso.x,this.oy+iso.y-10);
            this.player.setDepth(Math.floor(this.pcy)*COLS+Math.floor(this.pcx)+3.5);
        }
        // E 鍵互動
        if(Phaser.Input.Keyboard.JustDown(this.keyE)) this.interactNearest();
        // Tab 時間之書
        if(Phaser.Input.Keyboard.JustDown(this.keyTab)) this.toggleBook();
        // 互動提示
        this.updateHints();
        // 時間裂隙
        this.checkRift();
    }
    interactNearest() {
        let best=null,bestD=Infinity;
        this.interSprites.forEach((ct,i)=>{
            if(!ct.visible) return;
            if(this.collected.includes(ct._inter.id)) return;
            const d=Phaser.Math.Distance.Between(this.pcx,this.pcy,ct._inter.tileX,ct._inter.tileY);
            if(d<INTERACT_R&&d<bestD){bestD=d;best=i;}
        });
        if(best!==null) this.tryInteract(best);
    }
    updateHints() {
        let near=false;
        this.interSprites.forEach(ct=>{
            if(!ct.visible||this.collected.includes(ct._inter.id)) return;
            const d=Phaser.Math.Distance.Between(this.pcx,this.pcy,ct._inter.tileX,ct._inter.tileY);
            if(d<INTERACT_R){near=true;ct._label.setAlpha(1);}else ct._label.setAlpha(0);
        });
        if(near){this.hintTxt.setText('按 E 或點擊互動');this.hintTxt.setAlpha(1);}
        else this.hintTxt.setAlpha(0);
    }
}

// ═══════════════════════════════════════════
//  SECTION 9: CausalityScene — Storyteller 風格因果舞台
// ═══════════════════════════════════════════
class CausalityScene extends Phaser.Scene {
    constructor() { super('CausalityScene'); }
    init(data) {
        this.lvlIdx = data.level;
        this.ld = LEVELS[this.lvlIdx];
        this.stage = this.ld.stage;
        this.cards = [];
        this.actSlots = []; // [{rect,x,y,acceptIds,filled:[]}]
        this.solved = [];
        this.allSolved = false;
    }
    create() {
        this.cameras.main.fadeIn(500,0,0,0);
        // 紙張背景
        this.add.image(W/2,H/2,'paper').setDisplaySize(W,H);
        const ov = this.add.graphics();
        ov.fillStyle(0x1a1510,0.4); ov.fillRect(0,0,W,H);
        // 標題
        this.add.text(W/2,30,'因 果 舞 台',{
            fontSize:'26px',fontFamily:'Georgia,"Microsoft JhengHei",serif',color:INK
        }).setOrigin(0.5);
        this.add.text(W/2,58,'將證據拖入正確的幕中，還原因果關係',{
            fontSize:'12px',color:INK_LIGHT,fontFamily:'"Microsoft JhengHei",serif'
        }).setOrigin(0.5);
        // 時間軸箭頭
        const arrowG = this.add.graphics();
        arrowG.lineStyle(2,GOLD_HEX,0.4);
        wobblyLine(arrowG,100,165,W-100,165,20,1.5);
        arrowG.fillStyle(GOLD_HEX,0.4);
        arrowG.fillTriangle(W-100,165,W-115,158,W-115,172);
        this.add.text(85,155,'起因',{fontSize:'10px',color:INK_LIGHT}).setOrigin(1,0.5);
        this.add.text(W-85,155,'結果',{fontSize:'10px',color:INK_LIGHT}).setOrigin(0,0.5);
        // 幕 (Acts)
        const actCount = this.stage.acts.length;
        const actW = 180, actH = 200;
        const totalW = actCount * actW + (actCount-1) * 30;
        const startX = (W - totalW) / 2 + actW/2;
        this.stage.acts.forEach((act, i) => {
            const ax = startX + i * (actW + 30);
            const ay = 260;
            // 幕背景
            const abg = this.add.rectangle(ax, ay, actW, actH, Phaser.Display.Color.IntegerToColor(act.color).color, 0.3)
                .setStrokeStyle(1, 0x8a6a3a, 0.5);
            // 手繪邊框
            const ag = this.add.graphics();
            ag.lineStyle(1.5, 0x8a6a3a, 0.4);
            wobblyRect(ag, ax-actW/2, ay-actH/2, actW, actH, 2);
            // 幕標題
            this.add.text(ax, ay-actH/2+15, act.title, {
                fontSize:'13px',fontFamily:'"Microsoft JhengHei",serif',color:GOLD
            }).setOrigin(0.5);
            // Slot 區域
            const slotY = ay + 10;
            const slotCount = act.slots.length;
            const slots = [];
            act.slots.forEach((slotId, si) => {
                const sx = ax + (si - (slotCount-1)/2) * 80;
                const slotRect = this.add.rectangle(sx, slotY, 70, 50, 0x2c1810, 0.15)
                    .setStrokeStyle(1, 0x8a6a3a, 0.3);
                this.add.text(sx, slotY, '?', {fontSize:'18px',color:'#5a4a3a'}).setOrigin(0.5);
                slots.push({ rect: slotRect, x: sx, y: slotY, acceptId: slotId, filled: null });
            });
            // 幕動畫區域（成功後顯示）
            const animArea = this.add.container(ax, ay + actH/2 - 25).setAlpha(0);
            const animText = this.add.text(0, 0, act.text, {
                fontSize:'10px',fontFamily:'"Microsoft JhengHei",serif',color:'#c4b090',
                align:'center',lineSpacing:4,wordWrap:{width:actW-20}
            }).setOrigin(0.5);
            animArea.add(animText);
            this.actSlots.push({ bg: abg, slots, act, animArea, solved: false });
        });
        // 可拖曳的證據卡片（打亂）
        const allSlotIds = this.stage.acts.flatMap(a => a.slots);
        const evidences = allSlotIds.map(id => this.ld.interactions.find(i => i.id === id));
        const shuffled = Phaser.Utils.Array.Shuffle([...evidences]);
        const cardY = H - 90;
        const cardW = 90, cardSpacing = 100;
        const cardTotalW = shuffled.length * cardW + (shuffled.length-1) * (cardSpacing-cardW);
        const cardStartX = (W - cardTotalW) / 2 + cardW/2;
        shuffled.forEach((ev, i) => {
            const cx = cardStartX + i * cardSpacing;
            const cardBg = this.add.rectangle(cx, cardY, cardW, 60, 0x2c1810, 0.15)
                .setStrokeStyle(1, GOLD_HEX, 0.5)
                .setInteractive({ useHandCursor: true, draggable: true });
            const cardEmoji = this.add.text(cx, cardY-10, ev.emoji, {fontSize:'22px'}).setOrigin(0.5);
            const cardName = this.add.text(cx, cardY+14, ev.name, {
                fontSize:'9px',color:INK,fontFamily:'"Microsoft JhengHei",serif',
                align:'center',wordWrap:{width:80}
            }).setOrigin(0.5);
            const card = {
                bg: cardBg, emoji: cardEmoji, nameText: cardName,
                data: ev, origX: cx, origY: cardY, placedSlot: null
            };
            cardBg.on('dragstart', () => {
                audio.click();
                cardBg.setDepth(100); cardEmoji.setDepth(101); cardName.setDepth(101);
                cardBg.setStrokeStyle(2, GLOW_BLUE_HEX, 0.8);
                // 如果在 slot 裡，移出
                if (card.placedSlot) {
                    card.placedSlot.filled = null;
                    card.placedSlot = null;
                    this.checkActSolved();
                }
            });
            cardBg.on('drag', (p, dragX, dragY) => {
                cardBg.setPosition(dragX, dragY);
                cardEmoji.setPosition(dragX, dragY-10);
                cardName.setPosition(dragX, dragY+14);
            });
            cardBg.on('dragend', () => {
                cardBg.setDepth(0); cardEmoji.setDepth(1); cardName.setDepth(1);
                cardBg.setStrokeStyle(1, GOLD_HEX, 0.5);
                let placed = false;
                // 檢查所有 slot
                for (const actGroup of this.actSlots) {
                    for (const slot of actGroup.slots) {
                        const dist = Phaser.Math.Distance.Between(cardBg.x, cardBg.y, slot.x, slot.y);
                        if (dist < 50 && slot.filled === null) {
                            slot.filled = card;
                            card.placedSlot = slot;
                            this.tweens.add({targets:cardBg,x:slot.x,y:slot.y,duration:200,ease:'Back.easeOut'});
                            this.tweens.add({targets:cardEmoji,x:slot.x,y:slot.y-10,duration:200});
                            this.tweens.add({targets:cardName,x:slot.x,y:slot.y+14,duration:200});
                            placed = true;
                            break;
                        }
                    }
                    if (placed) break;
                }
                if (!placed) {
                    this.tweens.add({targets:cardBg,x:card.origX,y:card.origY,duration:250,ease:'Back.easeOut'});
                    this.tweens.add({targets:cardEmoji,x:card.origX,y:card.origY-10,duration:250});
                    this.tweens.add({targets:cardName,x:card.origX,y:card.origY+14,duration:250});
                }
                this.time.delayedCall(250, () => this.checkActSolved());
            });
            this.cards.push(card);
        });
        // 驗證按鈕
        this.verifyBtn = this.add.text(W/2, H-25, '[ 驗證因果鏈 ]', {
            fontSize:'13px',color:GOLD,fontFamily:'"Microsoft JhengHei",serif',
            backgroundColor:'#2c1810',padding:{x:14,y:6}
        }).setOrigin(0.5).setInteractive({useHandCursor:true});
        this.verifyBtn.on('pointerdown', () => this.verify());
        // 提示文字
        this.feedbackTxt = this.add.text(W/2, H-50, '', {
            fontSize:'11px',color:'#aa6666',fontFamily:'"Microsoft JhengHei",serif'
        }).setOrigin(0.5);
    }

    checkActSolved() {
        this.actSlots.forEach(ag => {
            const allFilled = ag.slots.every(s => s.filled !== null);
            const allCorrect = allFilled && ag.slots.every(s => s.filled.data.id === s.acceptId);
            if (allCorrect && !ag.solved) {
                ag.solved = true;
                audio.collect();
                // 幕成功動畫
                ag.bg.setFillStyle(Phaser.Display.Color.IntegerToColor(ag.act.color).color, 0.5);
                ag.slots.forEach(s => {
                    if(s.filled) s.filled.bg.setStrokeStyle(2, 0x4a8a4a, 0.8);
                });
                // 顯示動畫文字
                this.tweens.add({targets:ag.animArea,alpha:1,duration:600});
                // 幕中演出小動畫
                const emoji = this.add.text(ag.bg.x, ag.bg.y-20, ag.act.anim.emoji, {
                    fontSize:'28px'
                }).setOrigin(0.5).setAlpha(0);
                this.tweens.add({targets:emoji,alpha:1,y:ag.bg.y-40,duration:500,ease:'Back.easeOut'});
            }
        });
        // 所有幕都解決了嗎？
        if (this.actSlots.every(ag => ag.solved) && !this.allSolved) {
            this.allSolved = true;
            this.time.delayedCall(1000, () => this.onAllSolved());
        }
    }

    verify() {
        // 手動驗證按鈕
        let anyWrong = false;
        this.actSlots.forEach(ag => {
            ag.slots.forEach(s => {
                if (!s.filled) return;
                if (s.filled.data.id !== s.acceptId) {
                    anyWrong = true;
                    // 搖晃錯誤卡片
                    this.tweens.add({targets:s.filled.bg,x:s.x-4,duration:40,yoyo:true,repeat:5});
                    s.filled.bg.setStrokeStyle(2, 0xaa4444, 0.8);
                    this.time.delayedCall(1000, () => {
                        if(s.filled) s.filled.bg.setStrokeStyle(1, GOLD_HEX, 0.5);
                    });
                }
            });
        });
        if (anyWrong) {
            audio.error();
            this.feedbackTxt.setText('紅色標記的證據放錯了位置，再想想看...');
            this.time.delayedCall(2500, () => this.feedbackTxt.setText(''));
        } else {
            this.checkActSolved();
        }
    }

    onAllSolved() {
        audio.success();
        // 閃光
        const flash = this.add.rectangle(W/2,H/2,W,H,0xffffff,0).setDepth(200);
        this.tweens.add({targets:flash,alpha:0.2,duration:300,yoyo:true,onComplete:()=>flash.destroy()});
        // 成功文字
        const suc = this.add.text(W/2,H/2-20,'因果鏈修復完成！',{
            fontSize:'28px',fontFamily:'Georgia,"Microsoft JhengHei",serif',color:GOLD,
            stroke:'#000',strokeThickness:2
        }).setOrigin(0.5).setDepth(201).setAlpha(0);
        this.tweens.add({targets:suc,alpha:1,y:'-=15',duration:500,ease:'Back.easeOut'});
        const tp = this.add.text(W/2,H/2+20,`關鍵轉折點：${this.ld.turningPoint}`,{
            fontSize:'14px',color:'#c4b090',fontFamily:'"Microsoft JhengHei",serif',
            align:'center',wordWrap:{width:500}
        }).setOrigin(0.5).setDepth(201).setAlpha(0);
        this.tweens.add({targets:tp,alpha:1,duration:600,delay:500});
        // 轉場
        this.time.delayedCall(3500, () => {
            gameState.completedLevels.push(this.lvlIdx);
            this.cameras.main.fadeOut(800,0,0,0);
            this.time.delayedCall(800, () => {
                this.scene.start('TransitionScene', {fromLevel: this.lvlIdx});
            });
        });
    }
}

// ═══════════════════════════════════════════
//  SECTION 10: TransitionScene — 時間線修復
// ═══════════════════════════════════════════
class TransitionScene extends Phaser.Scene {
    constructor() { super('TransitionScene'); }
    init(data) { this.fromLevel = data.fromLevel; this.ld = LEVELS[this.fromLevel]; }
    create() {
        this.cameras.main.fadeIn(500,0,0,0);

        const ov=this.add.graphics(); ov.fillStyle(0x0a0a14,0.75); ov.fillRect(0,0,W,H);
        // 粒子匯聚到中心
        for(let i=0;i<50;i++){
            const p=this.add.circle(
                Phaser.Math.Between(0,W),Phaser.Math.Between(0,H),
                Phaser.Math.Between(1,3),GOLD_HEX,Phaser.Math.FloatBetween(0.2,0.6)
            );
            this.tweens.add({targets:p,x:W/2,y:H/2-60,alpha:0,
                duration:Phaser.Math.Between(1500,3000),delay:Phaser.Math.Between(0,800),ease:'Cubic.easeIn'});
        }
        // 修復中文字
        const repTxt=this.add.text(W/2,H/2-140,'時間線修復中...',{
            fontSize:'18px',fontFamily:'Georgia,"Microsoft JhengHei",serif',color:GLOW_BLUE
        }).setOrigin(0.5).setAlpha(0);
        this.tweens.add({targets:repTxt,alpha:1,duration:600,delay:400});
        // 中央光芒
        const glow=this.add.circle(W/2,H/2-60,4,GOLD_HEX,0);
        this.tweens.add({targets:glow,alpha:0.6,scaleX:10,scaleY:10,duration:1500,delay:1800,
            ease:'Cubic.easeOut',onComplete:()=>{
                this.tweens.add({targets:glow,alpha:0,scaleX:20,scaleY:20,duration:600});
            }});
        // 歷史小結
        const sumTitle=this.add.text(W/2,H/2-50,`${this.ld.name} — 歷史小結`,{
            fontSize:'20px',fontFamily:'Georgia,"Microsoft JhengHei",serif',color:GOLD
        }).setOrigin(0.5).setAlpha(0);
        this.tweens.add({targets:sumTitle,alpha:1,duration:600,delay:2800});
        // 分隔線
        const sepG=this.add.graphics().setAlpha(0);
        sepG.lineStyle(1,GOLD_HEX,0.3); wobblyLine(sepG,W/2-200,H/2-28,W/2+200,H/2-28,12,2);
        this.tweens.add({targets:sepG,alpha:1,duration:400,delay:3000});
        const sumText=this.add.text(W/2,H/2-15,this.ld.summary,{
            fontSize:'13px',fontFamily:'"Microsoft JhengHei",serif',color:'#b0a090',
            align:'center',lineSpacing:7,wordWrap:{width:520}
        }).setOrigin(0.5,0).setAlpha(0);
        this.tweens.add({targets:sumText,alpha:1,duration:800,delay:3200});
        // 下一關提示
        const isLast = this.fromLevel >= LEVELS.length-1;
        const nextMsg = isLast ? '進入結局...' : `前往下一個時代 — ${LEVELS[this.fromLevel+1].name}`;
        const nextTxt=this.add.text(W/2,H-60,nextMsg,{
            fontSize:'14px',color:GLOW_BLUE,fontFamily:'"Microsoft JhengHei",serif'
        }).setOrigin(0.5).setAlpha(0);
        this.tweens.add({targets:nextTxt,alpha:1,duration:500,delay:5000,onComplete:()=>{
            this.tweens.add({targets:nextTxt,alpha:0.3,duration:800,yoyo:true,repeat:-1});
        }});
        // 等待輸入
        this.time.delayedCall(5000,()=>{
            const go=()=>{
                this.cameras.main.fadeOut(800,0,0,0);
                this.time.delayedCall(800,()=>{
                    if(isLast) this.scene.start('EndingScene');
                    else{
                        gameState.currentLevel=this.fromLevel+1;
                        gameState.collected=[];
                        this.scene.start('GameScene',{level:this.fromLevel+1});
                    }
                });
            };
            this.input.keyboard.once('keydown',go);
            this.input.once('pointerdown',go);
        });
    }
}

// ═══════════════════════════════════════════
//  SECTION 11: EndingScene — 結局
// ═══════════════════════════════════════════
class EndingScene extends Phaser.Scene {
    constructor() { super('EndingScene'); }
    create() {
        this.cameras.main.fadeIn(1000,0,0,0);
        // 紙張背景
        this.add.image(W/2,H/2,'paper').setDisplaySize(W,H);
        const ov=this.add.graphics(); ov.fillStyle(0x0a0a14,0.5); ov.fillRect(0,0,W,H);
        // 彩虹
        const rainbowColors=[0xcc3333,0xcc7733,0xcccc33,0x33cc33,0x3333cc,0x5500aa,0x8800cc];
        const arcG=this.add.graphics().setDepth(1).setAlpha(0);
        rainbowColors.forEach((c,i)=>{
            arcG.lineStyle(3,c,0.5);
            arcG.beginPath(); arcG.arc(W/2,H/2+120,180-i*10,Math.PI,0,false); arcG.strokePath();
        });
        this.tweens.add({targets:arcG,alpha:1,duration:2000,delay:1000});
        // 標題
        const endTitle=this.add.text(W/2,H/2-170,'創世紀篇 — 完',{
            fontSize:'34px',fontFamily:'Georgia,"Microsoft JhengHei",serif',color:GOLD,
            stroke:'#000',strokeThickness:2
        }).setOrigin(0.5).setAlpha(0);
        this.tweens.add({targets:endTitle,alpha:1,y:'-=15',duration:800,delay:500,ease:'Back.easeOut'});
        // 結語
        const endText=this.add.text(W/2,H/2-100,[
            '時間修復師，你成功修復了創世紀的時間線。',
            '',
            '從伊甸園的純真與墮落，到該隱與亞伯的兄弟之爭，',
            '從世代的敗壞到諾亞方舟的洪水與重生——',
            '',
            '歷史告訴我們：',
            '每一個選擇都有後果，每一次毀滅都蘊含著新生的可能。',
            '',
            '彩虹是約定，是希望，是故事的延續。',
            '而你的旅程，才剛剛開始...'
        ].join('\n'),{
            fontSize:'14px',fontFamily:'"Microsoft JhengHei",serif',color:'#b0a090',
            align:'center',lineSpacing:5
        }).setOrigin(0.5,0).setAlpha(0);
        this.tweens.add({targets:endText,alpha:1,duration:1000,delay:2000});
        // 灰塵粒子
        for(let i=0;i<20;i++){
            const d=this.add.circle(Phaser.Math.Between(50,W-50),Phaser.Math.Between(50,H-50),
                Phaser.Math.Between(1,2),GOLD_HEX,Phaser.Math.FloatBetween(0.05,0.15));
            this.tweens.add({targets:d,y:d.y-40,alpha:0,duration:Phaser.Math.Between(4000,8000),
                delay:Phaser.Math.Between(0,3000),repeat:-1,yoyo:true});
        }
        // 返回按鈕
        const backBtn=this.add.text(W/2,H-55,'[ 返回主選單 ]',{
            fontSize:'14px',color:GOLD,fontFamily:'"Microsoft JhengHei",serif',
            backgroundColor:'#2c1810',padding:{x:16,y:8}
        }).setOrigin(0.5).setAlpha(0).setInteractive({useHandCursor:true});
        this.tweens.add({targets:backBtn,alpha:1,duration:500,delay:5000});
        backBtn.on('pointerover',()=>backBtn.setColor(GLOW_BLUE));
        backBtn.on('pointerout',()=>backBtn.setColor(GOLD));
        backBtn.on('pointerdown',()=>{
            this.cameras.main.fadeOut(800,0,0,0);
            this.time.delayedCall(800,()=>this.scene.start('MenuScene'));
        });
    }
}

// ═══════════════════════════════════════════
//  遊戲啟動
// ═══════════════════════════════════════════
const config = {
    type: Phaser.AUTO, width: W, height: H,
    parent: 'game-container', backgroundColor: '#1a1510',
    scene: [BootScene, MenuScene, GameScene, CausalityScene, TransitionScene, EndingScene],
    scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH }
};
const game = new Phaser.Game(config);
</script>
</body>
