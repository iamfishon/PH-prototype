<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlayHorny · 樣式預覽</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg:       #0d0d0d;
    --surface:  #181818;
    --surface2: #222;
    --border:   #2e2e2e;
    --red:      #d13639;
    --text:     #f0f0f0;
    --muted:    #777;
    --act-bg:   rgba(209,54,57,0.12);
  }

  html, body {
    height: 100%;
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
  }

  /* ── Layout shell ── */
  .shell {
    height: 100vh;
  }

  /* ── Controls wrapper (auto-hide overlay) ── */
  .controls-wrap {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 200;
    transform: translateY(calc(-100% + 8px));
    transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .controls-wrap:hover {
    transform: translateY(0);
  }
  .controls-wrap::after {
    content: '';
    display: block;
    height: 8px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    background-image: radial-gradient(ellipse 40px 2px at center 4px, rgba(255,255,255,0.18) 0%, transparent 100%);
  }

  /* ── Top header ── */
  .header {
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  .brand {
    font-family: 'Oswald', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--red);
  }
  .brand em {
    font-style: normal;
    color: var(--muted);
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 1.5px;
    margin-left: 10px;
  }

  /* Device toggle */
  .device-toggle {
    display: flex;
    gap: 3px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 3px;
  }

  .device-btn {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 5px 12px;
    border-radius: 5px;
    border: none;
    background: none;
    color: var(--muted);
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.18s;
    font-family: inherit;
    letter-spacing: 0.3px;
  }
  .device-btn svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 1.8; }
  .device-btn.active { background: var(--surface2); color: var(--text); }

  /* ── Control bar ── */
  .ctrl-bar {
    height: 50px;
    display: flex;
    align-items: center;
    gap: 0;
    padding: 0 20px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }

  /* Section tabs */
  .sec-tabs { display: flex; gap: 2px; }

  .sec-tab {
    padding: 6px 14px;
    border-radius: 6px;
    border: none;
    background: none;
    color: var(--muted);
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.18s;
    font-family: inherit;
    letter-spacing: 0.3px;
  }
  .sec-tab.active { background: var(--act-bg); color: var(--red); }

  .vr { width: 1px; height: 18px; background: var(--border); margin: 0 16px; flex-shrink: 0; }

  /* Style option groups */
  .opt-group {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .opt-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 0.5px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .opt-btns { display: flex; gap: 3px; }

  .opt-btn {
    padding: 5px 12px;
    border-radius: 5px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.18s;
    font-family: inherit;
    white-space: nowrap;
    letter-spacing: 0.2px;
  }
  .opt-btn:hover { border-color: #555; color: var(--text); }
  .opt-btn.active { border-color: var(--red); background: var(--act-bg); color: var(--red); }

  /* Section panels */
  .sec-panel { display: none; align-items: center; gap: 10px; flex: 1; }
  .sec-panel.active { display: flex; }

  /* ── Preview area ── */
  .preview {
    height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    overflow: hidden;
    padding: 0;
    position: relative;
  }

  .preview::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
    background-size: 28px 28px;
    pointer-events: none;
  }

  /* ── Browser/Phone frame ── */
  .frame-wrap {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: all 0.4s cubic-bezier(0.4,0,0.2,1);

    /* Desktop default */
    width: 100%;
    height: 100vh;
    border-radius: 10px;
    border: 1px solid #3d3d3d;
    box-shadow: 0 20px 70px rgba(0,0,0,0.55);
  }

  .frame-wrap.is-mobile {
    max-width: 393px;
    border-radius: 44px;
    border-width: 10px;
    border-color: #252525;
    box-shadow:
      0 40px 100px rgba(0,0,0,0.75),
      inset 0 0 0 1px rgba(255,255,255,0.06);
    height: min(852px, calc(100% - 8px));
  }

  /* Browser top bar */
  .frame-bar {
    height: 38px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 14px;
    background: #242424;
    border-bottom: 1px solid #1a1a1a;
    transition: all 0.4s;
  }
  .frame-wrap.is-mobile .frame-bar { display: none; }

  .dots { display: flex; gap: 5px; }
  .dot { width: 11px; height: 11px; border-radius: 50%; }
  .dot-r { background: #ff5f57; }
  .dot-y { background: #febc2e; }
  .dot-g { background: #28c840; }

  .url-bar {
    flex: 1;
    background: #1c1c1c;
    border: 1px solid #383838;
    border-radius: 5px;
    padding: 3px 10px;
    font-size: 11px;
    color: var(--muted);
    font-family: monospace;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Phone notch */
  .phone-notch {
    display: none;
    justify-content: center;
    align-items: center;
    height: 36px;
    background: #252525;
    flex-shrink: 0;
  }
  .notch-pill {
    width: 110px; height: 28px;
    background: #1a1a1a;
    border-radius: 14px;
  }
  .frame-wrap.is-mobile .phone-notch { display: flex; }

  /* Phone home indicator */
  .phone-home-bar {
    display: none;
    justify-content: center;
    align-items: flex-end;
    padding-bottom: 6px;
    height: 26px;
    background: #252525;
    flex-shrink: 0;
  }
  .home-pill {
    width: 120px; height: 4px;
    background: rgba(255,255,255,0.25);
    border-radius: 2px;
  }
  .frame-wrap.is-mobile .phone-home-bar { display: flex; }

  /* Iframe */
  .frame-content {
    flex: 1;
    overflow: hidden;
    background: #111;
  }

  #preview-frame {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
    transition: opacity 0.25s;
  }
  #preview-frame.fading { opacity: 0.3; }

  /* Current combo badge */
  .combo-badge {
    position: absolute;
    bottom: 28px;
    right: 28px;
    z-index: 10;
    background: rgba(10,10,10,0.88);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 11px;
    color: var(--muted);
    backdrop-filter: blur(8px);
    line-height: 1.7;
  }
  .combo-badge strong { color: var(--text); font-size: 12px; }
</style>
</head>
<body>
<div class="shell">

  <!-- Controls (auto-hide overlay) -->
  <div class="controls-wrap">

  <!-- Header -->
  <div class="header">
    <div class="brand">PlayHorny <em>STYLE SWITCHER</em></div>
    <div class="device-toggle">
      <button class="device-btn active" id="btn-mobile" onclick="setDevice('mobile')">
        <svg viewBox="0 0 24 24"><rect x="5" y="2" width="14" height="20" rx="2"/><circle cx="12" cy="17.5" r="1" fill="currentColor" stroke="none"/></svg>
        手機版
      </button>
      <button class="device-btn" id="btn-desktop" onclick="setDevice('desktop')">
        <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4" stroke-linecap="round"/></svg>
        桌機版
      </button>
    </div>
  </div>

  <!-- Control Bar -->
  <div class="ctrl-bar">

    <div class="sec-tabs">
      <button class="sec-tab active" id="tab-home" onclick="setSection('home')">首頁</button>
      <button class="sec-tab"        id="tab-info" onclick="setSection('info')">情報站</button>
    </div>

    <div class="vr"></div>

    <!-- 首頁 panel -->
    <div class="sec-panel active" id="panel-home">
      <div class="opt-group">
        <span class="opt-label">精選</span>
        <div class="opt-btns">
          <button class="opt-btn active" id="hs1" onclick="setHomeStyle(1)">2×2 格線</button>
          <button class="opt-btn"        id="hs2" onclick="setHomeStyle(2)">1大＋3小</button>
          <button class="opt-btn"        id="hs3" onclick="setHomeStyle(3)">直排全資訊</button>
          <button class="opt-btn"        id="hs4" onclick="setHomeStyle(4)">1大＋3直排</button>
        </div>
      </div>
    </div>

    <!-- 情報站 panel -->
    <div class="sec-panel" id="panel-info">
      <div class="opt-group">
        <span class="opt-label">遊戲列</span>
        <div class="opt-btns">
          <button class="opt-btn active" id="ig1" onclick="setInfoGame(1)">上方橫列</button>
          <button class="opt-btn"        id="ig2" onclick="setInfoGame(2)">左側欄位</button>
          <button class="opt-btn"        id="ig3" onclick="setInfoGame(3)">橫列＋下拉</button>
          <button class="opt-btn"        id="ig4" onclick="setInfoGame(4)">橫列＋PH</button>
        </div>
      </div>
      <div class="vr"></div>
      <div class="opt-group">
        <span class="opt-label">類型篩選</span>
        <div class="opt-btns">
          <button class="opt-btn"        id="it1" onclick="setInfoType(1)">側邊分割</button>
          <button class="opt-btn active" id="it2" onclick="setInfoType(2)">單選 Tabs</button>
          <button class="opt-btn"        id="it3" onclick="setInfoType(3)">多選 Pills</button>
        </div>
      </div>
    </div>

  </div>

  </div><!-- /.controls-wrap -->

  <!-- Preview -->
  <div class="preview">
    <div class="frame-wrap is-mobile" id="frame-wrap">
      <div class="phone-notch"><div class="notch-pill"></div></div>
      <div class="frame-bar">
        <div class="dots">
          <div class="dot dot-r"></div>
          <div class="dot dot-y"></div>
          <div class="dot dot-g"></div>
        </div>
        <div class="url-bar" id="url-bar">playhorny.html</div>
      </div>
      <div class="frame-content">
        <iframe id="preview-frame" src="playhorny.html"></iframe>
      </div>
      <div class="phone-home-bar"><div class="home-pill"></div></div>
    </div>

    <!-- Current combo info -->
    <div class="combo-badge" id="combo-badge">
      <strong>playhorny.html</strong><br>
      首頁 · 精選樣式1：2×2格線
    </div>
  </div>

</div>

<script>
  /* ── State ── */
  let device    = 'mobile';
  let section   = 'home';
  let homeStyle = 1;
  let infoGame  = 1;
  let infoType  = 2;

  /* ── File mapping ── */
  const homeFiles = {
    1: 'playhorny.html',
    2: 'playhorny_v2.html',
    3: 'playhorny_v3.html',
    4: 'playhorny_v4.html',
  };

  // 所有情報站組合由單一參數化文件處理（?g=遊戲列樣式 &t=類型篩選樣式）
  function infoFile(g, t) { return `情報站_demo.html?g=${g}&t=${t}`; }

  /* ── 各裝置可見的樣式清單 ── */
  const homeAvail   = { mobile: [1,2,3,4], desktop: [1,2]   };
  const gameAvail   = { mobile: [1,3,4], desktop: [1,2,3,4] };
  const typeDevice  = { mobile: [2,3],   desktop: [1,2,3] };

  function availTypes() {
    return typeDevice[device]; // 桌機所有組合皆有對應檔案，無額外組合限制
  }

  /* ── Labels ── */
  const homeLabels = { 1: '2×2 格線', 2: '1大＋3小', 3: '直排全資訊', 4: '1大＋3直排' };
  const gameLabels = { 1: '上方橫列', 2: '左側欄位', 3: '橫列＋下拉', 4: '橫列＋PH獨立' };
  const typeLabels = { 1: '側邊分割', 2: '單選 Tabs', 3: '多選 Pills' };

  /* ── Helpers ── */
  function $v(id) { return document.getElementById(id); }
  function act(id, on) { $v(id).classList.toggle('active', on); }
  function vis(id, show) { $v(id).style.display = show ? '' : 'none'; }

  function currentFile() {
    if (section === 'home') return homeFiles[homeStyle];
    return infoFile(infoGame, infoType);
  }

  function currentDesc() {
    if (section === 'home') return `首頁 · 精選：${homeLabels[homeStyle]}`;
    return `情報站 · ${gameLabels[infoGame]} ／ ${typeLabels[infoType]}`;
  }

  /* ── Preview ── */
  function updatePreview() {
    const frame = $v('preview-frame');
    const file  = currentFile();
    frame.classList.add('fading');
    setTimeout(() => {
      frame.src = file;
      frame.onload = () => frame.classList.remove('fading');
      $v('url-bar').textContent = file;
      $v('combo-badge').innerHTML = `<strong>${file}</strong><br>${currentDesc()}`;
    }, 200);
  }

  /* ── Sync visibility (called after device or game changes) ── */
  function syncVis() {
    // 首頁 精選
    const ha = homeAvail[device];
    [1,2,3,4].forEach(i => vis(`hs${i}`, ha.includes(i)));
    if (!ha.includes(homeStyle)) {
      homeStyle = ha[0];
      [1,2,3,4].forEach(i => act(`hs${i}`, i === homeStyle));
    }

    // 情報站 遊戲列
    const ga = gameAvail[device];
    [1,2,3,4].forEach(i => vis(`ig${i}`, ga.includes(i)));
    if (!ga.includes(infoGame)) {
      infoGame = ga[0];
      [1,2,3,4].forEach(i => act(`ig${i}`, i === infoGame));
    }

    // 情報站 類型篩選 (裝置 × 組合 雙重限制)
    const ta = availTypes();
    [1,2,3].forEach(i => vis(`it${i}`, ta.includes(i)));
    if (!ta.includes(infoType)) {
      infoType = ta[0];
      [1,2,3].forEach(i => act(`it${i}`, i === infoType));
    }
  }

  /* ── Setters ── */
  function setDevice(d) {
    device = d;
    $v('frame-wrap').classList.toggle('is-mobile', d === 'mobile');
    act('btn-mobile',  d === 'mobile');
    act('btn-desktop', d === 'desktop');
    syncVis();
    updatePreview();
  }

  function setSection(s) {
    section = s;
    ['home','info'].forEach(k => {
      act(`tab-${k}`, k === s);
      $v(`panel-${k}`).classList.toggle('active', k === s);
    });
    updatePreview();
  }

  function setHomeStyle(n) {
    homeStyle = n;
    [1,2,3,4].forEach(i => act(`hs${i}`, i === n));
    updatePreview();
  }

  function setInfoGame(n) {
    infoGame = n;
    [1,2,3].forEach(i => act(`ig${i}`, i === n));
    // 重算類型篩選可見性（組合限制）
    const ta = availTypes();
    [1,2,3].forEach(i => vis(`it${i}`, ta.includes(i)));
    if (!ta.includes(infoType)) {
      infoType = ta[0];
      [1,2,3].forEach(i => act(`it${i}`, i === infoType));
    }
    updatePreview();
  }

  function setInfoType(n) {
    infoType = n;
    [1,2,3].forEach(i => act(`it${i}`, i === n));
    updatePreview();
  }

  /* ── Init ── */
  (function init() {
    [1,2,3,4].forEach(i => act(`hs${i}`, i === homeStyle));
    [1,2,3].forEach(i => act(`ig${i}`, i === infoGame));
    [1,2,3].forEach(i => act(`it${i}`, i === infoType));
    setDevice('mobile');
  })();
</script>
</body>
</html>
